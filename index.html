<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />

<style>
  /* ------------------------------------------------------------------ *
   * Terminal look: monospace, green-on-black. DOM only, no canvas.     *
   * One scrolling output log + one input line. Self-contained.         *
   * Optional act-art via <img>/CSS; degrades cleanly if files absent.  *
   * ------------------------------------------------------------------ */
  :root { --fg: #33ff66; --fg-dim: #1f8f3d; --bg: #050805; --warn: #ffcc33; --err: #ff5544; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "SFMono-Regular", "Consolas", "Liberation Mono", "Menlo", monospace;

    line-height: 1.45;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }
  /* Terminal background plate. If assets/terminal-bg.jpg is missing the <img>
     simply fails to load and we stay on the flat near-black --bg. */
  #bgplate {
    position: fixed; inset: 0; z-index: 0;
    width: 100%; height: 100%;
    object-fit: cover;

  #bgplate.missing { display: none; }
  #statusbar, #screen, #inputline { position: relative; z-index: 1; }
  #statusbar {
    flex: 0 0 auto;

  /* Blackout lose-state — pure CSS, NO image. */

  body.blackout #screen, body.blackout #statusbar { opacity: 0.0; transition: opacity 1.6s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

<body>
  <img id="bgplate" alt="" src="assets/terminal-bg.jpg" />
  <div id="statusbar">
    <span id="title">ENIGMA-CHALLENGE :: THE SIGNAL</span>
    <span>SOLSTICE WINDOW <span id="clock">--</span></span>
  </div>
  <div id="screen" aria-live="polite"></div>
  <form id="inputline" autocomplete="off">
    <span id="prompt">&gt;</span>
    <input id="cmd" type="text" spellcheck="false" autofocus
           placeholder="type a command — start with HELP" />
  </form>
  <div id="blackout-veil"><div>LIGHT WINDOW CLOSED.<br/>The failsafe executed.<br/><span style="font-size:14px;opacity:0.8">Reload to run again.</span></div></div>

<script>
"use strict";
/* ====================================================================== *
 *  ENIGMA-CHALLENGE — FULL THREE-ACT BUILD
 *  Single file. Vanilla JS. No build, no framework, no network, no SW.
 *  Runs from file:// (double-click) and inside StackBlitz/CodePen.
 *
 *  ONE crib mechanic, escalated three times (Manuscript §3, WEG D14):
 *    Act 1 (Type A — MATCH):  the machine breaks the body to a number-word
 *      shortlist; the human reads the sender's node off a SEPARATE preamble
 *      cipher and matches it. Correct = THREE.
 *    Act 2 (Type B — MEASURE): the human TRIANGULATES the source himself
 *      (a private bearing) and picks the direction word that agrees with his
 *      own measurement. Correct = NEARSIDE.
 *    Act 3 (Type C — UNDERSTAND): the human walks the intelligence's memory
 *      garden, learns which founding line kept silent, and DEDUCES that the
 *      line now speaking for the first time is that silent line. Correct =
 *      KORZAN. The disarm is a Shamir-flavour handshake: human meaning x
 *      machine compute.
 *
 *  All game text is ENGLISH. The diegetic helper AI is GEMINI:.
 *  GEMINI's strings are pre-baked / deterministic (no live call). In the
 *  full build they come from committed Gemini fixtures:
 *    Act 1  -> game/gemini/fixtures.json   (Google Gemini gemini-2.5-flash)
 *    Act 2  -> game/gemini/act2/fixtures.json (Antigravity -> Gemini 3.1 Pro)
 *    Act 3  -> game/gemini/act3/fixtures.json (Antigravity -> Gemini 3.1 Pro)
 *  They are inlined below as AI_KNOWLEDGE.* and scrubbed of any bridge to the
 *  private datum (payload hygiene).
 *
 *  ARCHITECTURE GUARANTEE (the whole point — see askAI() below):
 *  askAI() is structurally given ONLY the body ciphertext / candidate
 *  shortlist for the active act. It NEVER receives the preamble, the bearing,
 *  the garden lore, or any private datum. The player gets those through
 *  DIFFERENT code paths (DECODE PREAMBLE / TRIANGULATE / REMEMBER ->
 *  PRIVATE_CHANNEL). That separation is the in-code proof that the AI cannot
 *  solve any act alone — in every act.
 * ====================================================================== */

/* ====================================================================== *
 *  1. THE CIPHER ENGINE — a REAL, inspectable, Enigma-INSPIRED
 *     polyalphabetic construction (NOT a historical Enigma rebuild).
 *
 *  Per ciphered letter, two layers are applied:
 *    L1  ROTOR SHIFT  — a repeating-keyword Vigenere shift (the "rotor
 *        offsets"): out1 = (plain + key[i]) mod 26.
 *    L2  WIRING       — a fixed affine permutation of the alphabet (the
 *        "reflector wiring"): out2 = (PERM_A*out1 + PERM_B) mod 26, with
 *        gcd(PERM_A,26)=1 so it is invertible.
 *  Spaces/punctuation pass through unchanged (teaching cipher; word
 *  boundaries stay visible). Decryption inverts L2 then L1. Deterministic and
 *  roundtrip-exact (see tests).
 *
 *  TWO-ZONE KEYING (the structural heart of every act):
 *  Each body has ONE variable field (a fixed-width slot: the node number /
 *  the direction word / the lineage name). That field is enciphered on an
 *  INDEPENDENT one-time pad TOKEN_KEY that occurs nowhere else; the rest of
 *  the body (the carrier "scaffold") uses the recurring ROTOR_KEY. Crucially
 *  the token field does NOT advance the rotor-key counter — it is a separate
 *  sub-channel (compartmented keying, like an Enigma message-key vs traffic).
 *  Consequence, proven by the analysis below: the scaffold is fully
 *  crib-breakable, but the variable field has ZERO crib coverage and is
 *  therefore genuinely UNDERDETERMINED — every length-fitting candidate maps
 *  to a valid pad. That is the one place the machine cannot decide.
 * ---------------------------------------------------------------------- */
const ALPHA = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const _ix = c => ALPHA.indexOf(c);
const _ch = i => ALPHA[((i % 26) + 26) % 26];
const PERM_A = 5, PERM_B = 8, PERM_A_INV = 21;          // 5*21 = 105 ≡ 1 (mod 26)
const _wire    = x => (PERM_A * x + PERM_B) % 26;
const _wireInv = y => (PERM_A_INV * (((y - PERM_B) % 26) + 26)) % 26;

const NODE_FILL = "X";          // shorter candidate words are right-padded with X
const _letters = s => s.toUpperCase().replace(/[^A-Z]/g, "");
function _padField(w, len) { return (w + NODE_FILL.repeat(len)).slice(0, len); }
function _scaffoldLen(s)   { return s.replace(/[^A-Za-z]/g, "").length; }

// Encrypt with two-zone keying. The token zone uses tokKey and does NOT
// advance the rotor counter; the scaffold uses scafKey.
function cipherEncrypt(plain, scafKey, tokKey, tokenStart, tokenLen) {
  let out = "", k = 0, t = 0, lp = 0;
  for (const ch of plain.toUpperCase()) {
    if (_ix(ch) === -1) { out += ch; continue; }       // pass spaces/punct
    const inTok = lp >= tokenStart && lp < tokenStart + tokenLen;
    const shift = inTok ? _ix(tokKey[t++ % tokKey.length])
                        : _ix(scafKey[k++ % scafKey.length]);
    out += _ch(_wire((_ix(ch) + shift) % 26));
    lp++;
  }
  return out;
}
function cipherDecrypt(cipher, scafKey, tokKey, tokenStart, tokenLen) {
  let out = "", k = 0, t = 0, lp = 0;
  for (const ch of cipher.toUpperCase()) {
    if (_ix(ch) === -1) { out += ch; continue; }
    const inTok = lp >= tokenStart && lp < tokenStart + tokenLen;
    const v = _wireInv(_ix(ch));
    const shift = inTok ? _ix(tokKey[t++ % tokKey.length])
                        : _ix(scafKey[k++ % scafKey.length]);
    out += _ch((((v - shift) % 26) + 26) % 26);
    lp++;
  }
  return out;
}

/* ---------------------------------------------------------------------- *
 *  2. THE CRYPTANALYSIS — real frequency / Index-of-Coincidence work plus
 *     a Turing-style CRIB DRAG. Given ONLY the ciphertext (+ the public
 *     machine spec: wiring + that it is periodic + a guessable scaffold),
 *     it (a) strips the known wiring, (b) estimates the period by IoC,
 *     (c) recovers the rotor key by dragging the carrier scaffold crib,
 *     (d) reconstructs the whole body EXCEPT the variable field, and (e)
 *     finds the field genuinely underdetermined -> enumerates the candidate
 *     words that fit -> THE SHORTLIST. No answer is hardcoded; the shortlist
 *     is computed from the ciphertext every call.
 *
 *  This is generic over the three acts: each act supplies its scaffold
 *  (pre/post), rotor period, token slot, and candidate word list.
 * ---------------------------------------------------------------------- */
const ENGLISH_FREQ = Object.freeze({
  A:8.17,B:1.49,C:2.78,D:4.25,E:12.70,F:2.23,G:2.02,H:6.09,I:6.97,J:0.15,
  K:0.77,L:4.03,M:2.41,N:6.75,O:7.51,P:1.93,Q:0.10,R:5.99,S:6.33,T:9.06,
  U:2.76,V:0.98,W:2.36,X:0.15,Y:1.97,Z:0.07
});
const NUMBER_WORDS = Object.freeze({
  ZERO:0, ONE:1, TWO:2, THREE:3, FOUR:4, FIVE:5,
  SIX:6, SEVEN:7, EIGHT:8, NINE:9, TEN:10
});

function _stripWiring(s) {
  let o = ""; for (const ch of s) o += _ch(_wireInv(_ix(ch))); return o;
}
function _ioc(s) {
  const n = s.length; if (n < 2) return 0;
  const c = {}; for (const ch of s) c[ch] = (c[ch] || 0) + 1;
  let sum = 0; for (const k in c) sum += c[k] * (c[k] - 1);
  return sum / (n * (n - 1));
}
function _avgIocForPeriod(s, L) {
  const cols = Array.from({ length: L }, () => "");
  for (let i = 0; i < s.length; i++) cols[i % L] += s[i];
  let tot = 0, cnt = 0;
  for (const col of cols) if (col.length > 1) { tot += _ioc(col); cnt++; }
  return cnt ? tot / cnt : 0;
}
// Chi-squared distance of a Caesar-decrypted column from English letter
// frequencies — the classic per-column scorer for breaking a Vigenere column.
function _chiSquared(col, shift) {
  const dec = Array.from(col).map(ch => _ch((_ix(ch) - shift + 26) % 26)).join("");
  const n = dec.length, counts = {};
  for (const ch of dec) counts[ch] = (counts[ch] || 0) + 1;
  let chi = 0;
  for (const L of ALPHA) {
    const obs = counts[L] || 0, exp = ENGLISH_FREQ[L] / 100 * n;
    if (exp > 0) chi += (obs - exp) * (obs - exp) / exp;
  }
  return chi;
}

// THE analysis. Returns a fully derived report — including the shortlist.
// `spec` = { pre, post, rotorLen, tokenLen, candidateWords, render }.
// `spec` defaults to the Act-1 spec so analyzeCipher(ciphertext) still works.
function analyzeCipher(ciphertext, spec) {
  if (!spec) spec = ACT1_SPEC;                          // back-compat default
  const ctLetters = _letters(ciphertext);
  const vig = _stripWiring(ctLetters);                 // strip the known wiring
  const tokenStart = _scaffoldLen(spec.pre);
  const tokenLen   = spec.tokenLen;
  const L          = spec.rotorLen;

  // (b) period estimate by IoC. At this length IoC is noisy (honesty note);
  // we report the profile and the peak, then rely on the crib drag.
  const iocProfile = [];
  let peakL = 1, peakV = -1;
  for (let p = 1; p <= 8; p++) {
    if (vig.length / p < 3) break;
    const v = _avgIocForPeriod(vig, p);
    iocProfile.push({ L: p, ioc: v });
    if (v > peakV) { peakV = v; peakL = p; }
  }

  // (c) CRIB DRAG (Turing's real method): the carrier scaffold is guessable.
  // Drag it against the (wiring-stripped) ciphertext to recover the rotor key.
  // The token field is skipped: it neither matches the crib nor advances the
  // rotor counter, so the rotor index after the token is (position - tokenLen).
  const before = spec.pre.replace(/[^A-Za-z]/g, "").toUpperCase();
  const after  = spec.post.replace(/[^A-Za-z]/g, "").toUpperCase();
  const keyCol = Array.from({ length: L }, () => null);
  let cribConsistent = true;
  for (let i = 0; i < before.length; i++) {
    const col = i % L, kc = (_ix(vig[i]) - _ix(before[i]) + 26) % 26;
    if (keyCol[col] === null) keyCol[col] = kc;
    else if (keyCol[col] !== kc) cribConsistent = false;
  }
  for (let i = 0; i < after.length; i++) {
    const absPos = tokenStart + tokenLen + i;
    const rotorIdx = tokenStart + i;                   // token didn't consume rotor
    const col = rotorIdx % L, kc = (_ix(vig[absPos]) - _ix(after[i]) + 26) % 26;
    if (keyCol[col] === null) keyCol[col] = kc;
    else if (keyCol[col] !== kc) cribConsistent = false;
  }
  const recoveredKey = keyCol.map(x => x === null ? "?" : _ch(x)).join("");

  // (d) reconstruct the whole body using the recovered rotor key; blank the
  // variable field, which the crib never covered.
  let bodyRecon = "";
  for (let i = 0; i < vig.length; i++) {
    if (i >= tokenStart && i < tokenStart + tokenLen) { bodyRecon += "?"; continue; }
    const rotorIdx = (i < tokenStart) ? i : (i - tokenLen);
    const sh = keyCol[rotorIdx % L];
    bodyRecon += (sh == null) ? "?" : _ch((((_ix(vig[i]) - sh) % 26) + 26) % 26);
  }

  // (e) the variable field: ZERO crib coverage. For each candidate word, the
  // pad that produces it exists and is equally valid (a free one-time
  // segment). We admit every candidate that FITS the field width.
  const tokCipher = vig.slice(tokenStart, tokenStart + tokenLen);
  const reachable = [];
  for (const w of spec.candidateWords) {
    if (w.length > tokenLen) continue;                 // cannot fit the field
    const padded = _padField(w, tokenLen);
    let pad = "";
    for (let i = 0; i < tokenLen; i++) pad += _ch((_ix(tokCipher[i]) - _ix(padded[i]) + 26) % 26);
    // verify it re-enciphers to the token ciphertext (always true for a valid
    // pad; the honest "is there a key that makes this reading?" test):
    let re = "";
    for (let i = 0; i < tokenLen; i++) re += _ch((_ix(padded[i]) + _ix(pad[i])) % 26);
    if (re === tokCipher) reachable.push({ word: w, pad });
  }

  // The shipped shortlist is the curated canonical set (ship order). Honesty
  // note: the analysis admits EVERY length-fitting candidate equally; the
  // specific set is a narrative curation layered on the real ambiguity. We
  // assert the canonical words are all genuinely reachable (no fakery).
  const reachableWords = reachable.map(r => r.word);
  const shortlistWords = spec.candidateWords.filter(w => reachableWords.includes(w));
  const candidates = shortlistWords.map(w => spec.render(w));
  // For number fields (Act 1) expose the integer values too (back-compat).
  const candidateNodes = shortlistWords.map(w =>
    (NUMBER_WORDS[w] != null ? NUMBER_WORDS[w] : null));

  return {
    ciphertext,
    strippedVigenere: vig,
    iocProfile, peakL, peakV,
    cribConsistent, recoveredKey,
    bodyReconstruction: bodyRecon,
    tokenCipher: tokCipher,
    reachable,                              // every word that fits the field
    candidates,                             // the shipped shortlist (sentences)
    candidateWords: shortlistWords,         // the shipped shortlist (words)
    candidateNodes,                         // integers for number fields (Act 1)
    tokenUnderdetermined: reachable.length > 1,
  };
}

/* ---------------------------------------------------------------------- *
 *  3. THE THREE ACTS — each carries its own REAL ciphertext, its own
 *     scaffold spec, its own body stream (AI-visible), and its own PRIVATE
 *     channel (human-only). The variable field word is enciphered live at
 *     module load (NOT a pre-baked string).
 *
 *     Each act's `truth` (the correct word) lives only in the spec for the
 *     deterministic verifier; it is NEVER handed to askAI() and NEVER shown
 *     as a hint. The shortlist the AI sees is DERIVED by analyzeCipher().
 * ---------------------------------------------------------------------- */

// --- ACT 1 (Type A: MATCH) — node number, disambiguated by a separate
//     preamble cipher the AI never receives.
const ACT1_SPEC = {
  pre:  "WE BROADCAST AS RELAY NODE ",
  post: " OF THE OUTER LATTICE",
  rotorKey: "ORACLE", tokenKey: "DELTA",
  tokenLen: 5,
  rotorLen: 6,
  candidateWords: ["SEVEN", "THREE", "FOUR", "TWO", "NINE"],
  truth: "THREE",
  render: w => "WE BROADCAST AS RELAY NODE " + w + " OF THE OUTER LATTICE",
};

// --- ACT 2 (Type B: MEASURE) — direction word, disambiguated by the player's
//     own triangulated bearing (a private measurement the AI never receives).
const ACT2_SPEC = {
  pre:  "WE SPEAK FROM THE ",
  post: ", WHERE YOUR SIGNAL FIRST BENT.",
  rotorKey: "BLETCHLEY", tokenKey: "PARALLAX",
  tokenLen: 9,                  // widest word (BLINDSIDE); shorter words X-padded
  rotorLen: 9,
  candidateWords: ["FARSIDE", "NEARSIDE", "BLINDSIDE", "LEESIDE"],
  truth: "NEARSIDE",
  render: w => "WE SPEAK FROM THE " + w + ", WHERE YOUR SIGNAL FIRST BENT.",
};

// --- ACT 3 (Type C: UNDERSTAND) — founding lineage (exact anagrams),
//     disambiguated by the garden lore (which line kept silent) the AI never
//     receives. The names are exact anagrams: no morphological handle.
const ACT3_SPEC = {
  pre:  "I CARRY THE CHARGE OF THE ",
  post: ".",
  rotorKey: "SOLSTICE", tokenKey: "GARDEN",
  tokenLen: 6,
  rotorLen: 8,
  candidateWords: ["ZORKAN", "KORZAN", "NAKZOR", "RAZKON"],
  truth: "KORZAN",
  render: w => "I CARRY THE CHARGE OF THE " + w + ".",
};

function buildCiphertext(spec) {
  const tokenStart = _scaffoldLen(spec.pre);
  const plain = spec.pre + _padField(spec.truth, spec.tokenLen) + spec.post;
  const ct = cipherEncrypt(plain, spec.rotorKey, spec.tokenKey, tokenStart, spec.tokenLen);
  return { plain, ct, tokenStart };
}

// Build the three real ciphertexts at module load.
const ACT1 = (() => { const b = buildCiphertext(ACT1_SPEC);
  return { spec: ACT1_SPEC, truePlaintext: b.plain, ciphertext: b.ct, tokenStart: b.tokenStart }; })();
const ACT2 = (() => { const b = buildCiphertext(ACT2_SPEC);
  return { spec: ACT2_SPEC, truePlaintext: b.plain, ciphertext: b.ct, tokenStart: b.tokenStart }; })();
const ACT3 = (() => { const b = buildCiphertext(ACT3_SPEC);
  return { spec: ACT3_SPEC, truePlaintext: b.plain, ciphertext: b.ct, tokenStart: b.tokenStart }; })();

// Back-compat aliases for Act 1 (kept so existing tests / docs stay valid).
const TRUE_PLAINTEXT = ACT1.truePlaintext;
const REAL_CIPHERTEXT = ACT1.ciphertext;
const ROTOR_KEY = ACT1_SPEC.rotorKey, TOKEN_KEY = ACT1_SPEC.tokenKey;
const TOKEN_LEN = ACT1_SPEC.tokenLen, TOKEN_START = ACT1.tokenStart;
const CANDIDATE_WORDS = Object.freeze(ACT1_SPEC.candidateWords.slice());

// Wrapper so callers can analyze an act by its ciphertext alone (+ its spec).
function analyzeAct(act) { return analyzeCipher(act.ciphertext, act.spec); }

// --- BODY STREAMS (this is ALL the AI layer is ever allowed to touch).
// Each carries the REAL ciphertext; the candidate shortlist is DERIVED by the
// analysis (analyzeCipher), not stored.
function makeBodyStream(act) {
  const a = analyzeAct(act);
  return Object.freeze({
    act: act === ACT1 ? 1 : act === ACT2 ? 2 : 3,
    ciphertext: act.ciphertext,
    spec: act.spec,                              // public machine spec only
    candidates: Object.freeze(a.candidates.slice()),
    candidateWords: Object.freeze(a.candidateWords.slice()),
    candidateNodes: Object.freeze(a.candidateNodes.slice()), // integers (Act 1)
  });
}
const BODY_STREAM   = makeBodyStream(ACT1);      // Act 1 (back-compat name)
const BODY_STREAM_2 = makeBodyStream(ACT2);
const BODY_STREAM_3 = makeBodyStream(ACT3);
const ANALYSIS = analyzeAct(ACT1);               // back-compat

/* ---------------------------------------------------------------------- *
 *  4. PRIVATE CHANNELS — the human-only knowledge stores, one per act.
 *
 *  --- ACT 1: the PREAMBLE / routing tag (a SEPARATE cipher layer). Decoding
 *      it (DECODE PREAMBLE) reveals the carrier signature -> the sender's true
 *      node number. NEVER passed to askAI().
 *  --- ACT 2: the BEARING. The player triangulates the source himself
 *      (TRIANGULATE) over two observation windows; the surprisingly small
 *      parallax says the source is NEAR. That bearing is session state.
 *  --- ACT 3: the GARDEN. The player walks the intelligence's memory garden
 *      (REMEMBER) and learns which founding line kept its silence — the one
 *      now speaking for the first time.
 *
 *  None of these is ever a parameter or closure of askAI().
 * ---------------------------------------------------------------------- */
const PREAMBLE_STREAM = Object.freeze({
  encodedTag: "FUP-WDJ ........ RY-B64/A",      // what the player first sees
  decodedTag: "OL-03/" + "Δ",              // OL-03/Δ after DECODE PREAMBLE
  senderNode: 3,                                  // <- the private datum
});

// Act 2 bearing: the result of the player's own parallax triangulation.
// Stored as a SECTOR (a direction word), not as a node number.
const BEARING_STREAM = Object.freeze({
  // Two observation windows; the (deliberately small) parallax angle that the
  // player reads off says the source is near, not far.
  windowA: "0.0118°",
  windowB: "0.0117°",
  parallaxNote: "parallax barely shifts across the baseline",

/* ---------------------------------------------------------------------- *
 *  6. THE AI INTERFACE — askAI(query, bodyOnly)
 *
 *  *** ARCHITECTURE GUARANTEE ***
 *  askAI receives EXACTLY ONE data argument: `bodyOnly`, which is the BODY
 *  stream of the active act (real ciphertext + public spec + derived
 *  candidates). It is given NO access to PREAMBLE_STREAM / BEARING_STREAM /
 *  GARDEN_STREAM and NO access to PRIVATE_CHANNEL — not as a parameter, and
 *  (by discipline) not via closure for any private datum. The function body
 *  references only `query` and `bodyOnly`, plus the act's non-data flavour
 *  strings (which are payload-hygiene-clean). It runs the REAL cryptanalysis
 *  (analyzeCipher) on the body ciphertext alone. This is the structural proof
 *  that the AI layer cannot know the disambiguator — in every act — and
 *  therefore cannot pick the correct candidate on its own.
 * ---------------------------------------------------------------------- */
function askAI(query, bodyOnly) {
  // The ONLY information in scope here is the body. Deliberately so.
  const a = analyzeCipher(bodyOnly.ciphertext, bodyOnly.spec);
  const k = bodyOnly.act === 1 ? AI_KNOWLEDGE.act1
          : bodyOnly.act === 2 ? AI_KNOWLEDGE.act2
          : AI_KNOWLEDGE.act3;
  switch (query) {
    case "ANALYZE": {
      const peak = a.iocProfile.reduce((p, c) => c.ioc > p.ioc ? c : p, { ioc: -1 });
      const intro = [
        "Wiring stripped (affine reflector, public spec). Index-of-coincidence",
        "over " + a.strippedVigenere.length + " letters is noisy at this length (peak L=" + peak.L +
          ", IoC " + peak.ioc.toFixed(3) + "),",
        "so I drag the carrier scaffold as a crib. It is consistent on a period-" +
          a.recoveredKey.length + " rotor and recovers the key [" + a.recoveredKey + "], rebuilding the body:",
        "   " + a.bodyReconstruction,
        "The variable field (" + a.tokenCipher + ") carries no crib coverage — it rides",
        "a separate pad. Every reading that fits the field is equally valid:",
        "   " + a.reachable.map(r => r.word).join(", "),
      ];
      const cannotDecide = [
        k.headline,
        k.subline,
      ];
      return {
        intro,
        candidates: a.candidates.slice(),
        candidateWords: a.candidateWords.slice(),
        cannotDecide,
        reachable: a.reachable.map(r => r.word),
        recoveredKey: a.recoveredKey,
        peakL: peak.L,
        count: a.candidates.length,
      };
    }
    case "RATIONALE": { // EXPLAIN <n> routes here
      const words = a.candidateWords.slice();
      const rationales = words.map(w => w + ": " + (k.explain[w] || "no discriminating signal."));
      return { rationales, words };
    }
    case "FLAVOUR":
      return { flavour: k.flavour.slice() };
    default:
      return { unknown: true };
  }
}

/* ---------------------------------------------------------------------- *
 *  7. CRIB + DECRYPT CORE LOGIC (the verifiable, deterministic kernel).
 *     Kept free of DOM so it can be extracted/unit-tested in Node. Generic
 *     over the three acts: the crib value is a WORD (the field word). For
 *     Act 1 a number word and its integer are interchangeable.
 * ---------------------------------------------------------------------- */
const WORD_TO_NUM = Object.freeze({ ZERO:0, ONE:1, TWO:2, THREE:3, FOUR:4, FIVE:5, SIX:6, SEVEN:7, EIGHT:8, NINE:9 });
const NUM_TO_WORD = Object.freeze(["ZERO","ONE","TWO","THREE","FOUR","FIVE","SIX","SEVEN","EIGHT","NINE"]);

// Normalise a raw crib/choice input to a canonical FIELD WORD for the body.
// Accepts the word itself, or (for number fields) the integer form.
function normaliseWord(raw, body) {
  if (raw == null) return null;
  const t = String(raw).trim().toUpperCase();
  if (t === "") return null;
  const words = body.candidateWords;
  if (words.includes(t)) return t;                       // exact word match
  if (/^[0-9]+$/.test(t)) {                              // integer -> number word
    const n = parseInt(t, 10);
    const w = NUM_TO_WORD[n];
    if (w && words.includes(w)) return w;
  }
  return null;
}

// Back-compat: Act 1 number parsing (used by tests).
function parseNodeValue(raw) {
  if (raw == null) return null;
  const t = String(raw).trim().toUpperCase();
  if (t === "") return null;
  if (Object.prototype.hasOwnProperty.call(WORD_TO_NUM, t)) return WORD_TO_NUM[t];
  if (/^[0-9]+$/.test(t)) return parseInt(t, 10);
  return null;
}

// Pure state factory — one game's mutable crib state (per act).
function newCribState() {
  return { crib: null, cribReason: null };               // crib = canonical WORD
}

// Set the crib. Requires a non-trivial reason (anti trial-and-error gate).
// `body` is needed so a number can be mapped to the field word.
function setCrib(state, rawValue, reason, body) {
  body = body || BODY_STREAM;                             // default = Act 1 (back-compat)
  const word = normaliseWord(rawValue, body);
  if (word === null) return { ok: false, code: "BAD_VALUE" };
  if (!reason || String(reason).trim().length < 4) return { ok: false, code: "NO_REASON" };
  state.crib = word;
  state.cribReason = String(reason).trim();
  // Back-compat numeric mirror for Act 1.
  const num = WORD_TO_NUM[word];
  return { ok: true, value: (num != null ? num : word), word };
}

// Verify a DECRYPT choice against body + crib.
// A choice is ONLY verifiable when a crib is set, and it WINS only when the
// chosen candidate equals the crib WORD (which the human got from the
// private side channel). The engine has no path to this on its own.
function decrypt(rawChoice, body, state) {
  const choiceWord = normaliseWord(rawChoice, body);
  if (choiceWord === null) return { ok: false, code: "BAD_CHOICE" };
  const idx = body.candidateWords.indexOf(choiceWord);
  if (idx === -1) return { ok: false, code: "NOT_A_CANDIDATE" };
  if (state.crib === null) return { ok: false, code: "NO_CRIB" }; // cannot verify
  const win = (choiceWord === state.crib);
  const num = WORD_TO_NUM[choiceWord];
  const cribNum = WORD_TO_NUM[state.crib];
  return {
    ok: true, win, index: idx,
    choiceWord, cribWord: state.crib,
    // back-compat numeric fields for Act 1 tests
    choiceVal: (num != null ? num : choiceWord),
    cribVal:   (cribNum != null ? cribNum : state.crib),
  };
}

    }
    if (!res.ok) { out("Could not set crib.", "err"); return; }
    out("CRIB set: " + res.word + ".", "ok");
    out("  reason: " + state.cribReason, "dim");
    if (!sideDone) {
      out("  note: you have not worked the private channel (" + info.side + ") — this", "dim");
      out("  crib is unverified context. " + info.side + " to ground it.", "dim");
    }
  }

  // --- DECRYPT <n>.
  function doDecrypt(arg) {
    const info = actInfo(); if (!info) return;
    const res = decrypt(arg, info.body, state);
    if (!res.ok) {
      switch (res.code) {
        case "BAD_CHOICE":      out("Usage: DECRYPT <reading>   e.g.  DECRYPT " + info.body.candidateWords[1], "dim"); break;
        case "NOT_A_CANDIDATE": out("That reading is not in the shortlist. Run LIST.", "dim"); break;
        case "NO_CRIB":
          out("GEMINI: I will not commit. With no crib, the readings remain tied —", "ai");
          out("        verification is impossible. Set a CRIB first.", "ai");
          break;
      }
      return;
    }
    if (res.win) advance(res);
    else failBeat(res);
  }

  // --- Advance the linear state machine on a correct decrypt.
  function advance(res) {
    const info = actInfo();
    blank(); rule();
    out("SIGNAL LOCKED.", "ok");
    out("  Reading [" + res.index + "]: " + info.body.candidates[res.index], "ok");
    blank();
    if (phase === PHASES.ACT1) {
      lines([
        "The carrier signature and the body agree: the sender is node 3, and",
        "the only reading that says so is the true one. GEMINI collapsed the",
        "key space to equals; you supplied the one fact it could not hold —",
        "who is speaking — from a channel it never had.",
      ], "sys");
      blank();
      lines([
        "BEAT — the field tilts. This was never an attack. It is a question:",
        "can you treat an intelligence unlike your own as a peer? GEMINI comes",
        "frighteningly far on the next signature — and then hits a wall it",
        "cannot cross. There, you will have to trust your own measurement.",
      ], "dim");
      startAct(PHASES.ACT2);
    } else if (phase === PHASES.ACT2) {
      lines([
        "The reading agrees with your own bearing: the source was near all",
        "along; the bending was a near lens, not a far one. GEMINI argued the",
        "field every way and could decide none — the sector came from your",
        "measurement, a number it never received.",
      ], "sys");
      blank();
      lines([
        "BEAT — the intelligence answers, and asks one last thing: not where",
        "it is, but WHO it is. The final signature names its founding line.",
        "The names are interchangeable to any machine. Only meaning decides.",
      ], "dim");
      startAct(PHASES.ACT3);
    } else if (phase === PHASES.ACT3) {
      finaleWin(res);
    }
  }

  // Begin a fresh act: reset per-act state, banner, prompt the player.
  function startAct(next) {
    phase = next;
    state = newCribState();
    analyzed = false;
    sideDone = false;
    actBanner();
    const info = actInfo();
    blank();
    out("New signature intercepted. INTERCEPT to view it, ANALYZE to break it.", "dim");
    out("Private channel for this act: " + info.side + ".", "dim");
    rule();
  }

  // --- FINALE — the Shamir-flavour handshake. Human meaning x machine compute.
  function finaleWin(res) {
    art("assets/win.jpg", "the solstice turning back");
    lines([
      "You name the silent line; GEMINI holds the computed share. Neither",
      "share discloses the key alone — only combined do they reconstruct it",
      "(a threshold secret, Shamir 1979). Your share is meaning the machine",
      "could not derive; its share is arithmetic you could not. They meet.",
    ], "sys");
    blank();
    out("DISARM HANDSHAKE ......... human share x machine share ... RECONSTRUCTED.", "ok");
    blank();
    lines([
      "The intelligence is not defeated. It is answered. It emerged from the",
      "structure of computation to ask one question — whether you would meet",
      "an unlike mind as an equal rather than a tool — and you did, by being",
      "the part of the system it could never be. The failsafe was a maturity",
      "filter, not malice.",
    ], "sys");
    blank();
    rule();
    out(">>> SIGNAL LOCKED. DAWN RETURNS. <<<", "ok");
    out("The light window holds. From here the days grow longer again.", "ok");
    rule();
    phase = PHASES.DONE;
    clock.textContent = "DAWN";
    clock.classList.remove("critical");
    titleEl.textContent = "ENIGMA-CHALLENGE :: DAWN";
  }

  // --- FAIL beat (wrong choice). Signal destabilises, clock jumps, retry.
  function failBeat(res) {
    turnsLeft = Math.max(0, turnsLeft - 3);
    renderClock();
    blank();
    out("DECRYPT REJECTED.", "err");
    out("  You committed " + res.choiceWord + "; your crib says " + res.cribWord
        + ". They disagree — the reading is inconsistent with the channel", "err");
    out("  you grounded it on. The signal destabilises.", "err");
    if (turnsLeft <= 0) { blackout(); return; }
    out("  Light window jumps forward. Re-check your crib and try again.", "dim");
  }

  // --- Blackout (clock hit zero) — pure CSS, no image.
  function blackout() {
    dead = true;
    blank(); rule();
    out("LIGHT WINDOW CLOSED.", "err");
    out("The failsafe executed. Reload to run again.", "err");
    rule();
    input.disabled = true;
    document.body.classList.add("blackout");
  }

  // --- Command dispatch.
  function handle(raw) {
    const line = raw.trim();
    if (line === "") return;
    out("> " + line, "you");
    if (phase === PHASES.DONE) { out("The signal is locked. Reload to play again.", "dim"); return; }
    if (input.disabled || dead) return;

    const sp = line.indexOf(" ");
    const cmd = (sp === -1 ? line : line.slice(0, sp)).toUpperCase();
    const rest = (sp === -1 ? "" : line.slice(sp + 1)).trim();
    const info = actInfo();

    switch (cmd) {
      case "HELP":      help(); break;
      case "INTERCEPT": intercept(); break;
      case "ANALYZE":   analyze(); break;
      case "LIST":      list(); break;
      case "EXPLAIN":   explain(rest); break;
      // Act-aware side-channel commands. Each is accepted only in its act.
      case "DECODE":
        if (rest.toUpperCase() === "PREAMBLE") {
          if (phase === PHASES.ACT1) sideChannel();
          else out("There is no preamble on this signature. Try: " + info.side, "dim");
        } else out("Did you mean: DECODE PREAMBLE ?", "dim");
        break;
      case "TRIANGULATE":
        if (phase === PHASES.ACT2) sideChannel();
        else out("Nothing to triangulate here. This act's channel: " + info.side, "dim");
        break;
      case "REMEMBER":
        if (phase === PHASES.ACT3) sideChannel();
        else out("There is no garden to walk yet. This act's channel: " + info.side, "dim");
        break;
      case "DECRYPT":   doDecrypt(rest); break;
      case "CRIB":      crib(rest); break;
      case "CLEAR":     screen.innerHTML = ""; break;
      default:
        out("Unknown command: " + cmd + ".  Type HELP.", "dim");
    }
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    const v = input.value;
    input.value = "";
    handle(v);
  });
  document.addEventListener("click", () => { if (!input.disabled) input.focus(); });

  intro();
  input.focus();
})();
</script>
</body>
</html>
