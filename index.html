<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />

<title>DAWN OR ECLIPSE // THE SIGNAL</title>
<style>
  /* ================================================================== *
   * DAWN OR ECLIPSE — CRT console. Bletchley-meets-2026 terminal.
   * Phosphor-green world; three distinct voices (YOU / GEMINI / the
   * alien); the solstice window as a draining gauge that dims the
   * screen as it closes. Prose reflows naturally; ciphertext stays
   * monospace. DOM only, no canvas, no build, zero external deps.
   * ================================================================== */
  :root {
    --void:#04070a; --phosphor:#36f08a; --phosphor-dim:#1c7a4c;
    --you:#d8d3c2; --gemini:#67d4ff; --alien:#bb86ff; --solar:#ffc24d;
    --alarm:#ff4d4d; --rule:#0e2a1c; --gold:#ffd98a;
    --accent:var(--phosphor); --wash:rgba(54,240,138,0.09); --tension:0;
    --col:78ch;   /* the centred console column */
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--void); color: var(--phosphor);
    font-family: "SFMono-Regular", "JetBrains Mono", "Consolas", "Liberation Mono", "Menlo", monospace;
    font-size: clamp(13px, 0.4vw + 10px, 16px); line-height: 1.5;
    height: 100vh; overflow: hidden;
  }
  .crt { position: relative; height: 100vh; display: flex; flex-direction: column;
    background: radial-gradient(120% 90% at 50% 38%, var(--wash), transparent 70%), var(--void);
    transition: background 1.2s ease; }
  .crt::after { content:""; position:absolute; inset:0; z-index:60; pointer-events:none;
    background: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.22) 3px);
    mix-blend-mode: multiply; }
  /* time-pressure veil: the closing light window. tightens/darkens as --tension rises. */
  #veil { position:absolute; inset:0; z-index:55; pointer-events:none;
    box-shadow: inset 0 0 240px 64px rgba(0,0,0,0.82);
    background: radial-gradient(130% 120% at 50% 45%, transparent calc(56% - var(--tension)*38%), rgba(0,0,0,0.8));
    transition: background 1.4s ease; }
  body.armed #veil { animation:veil-breathe 6.5s ease-in-out infinite; }
  @keyframes veil-breathe { 0%,100%{ opacity:.9; } 50%{ opacity:1; } }
  body.crit #veil { animation:none; background: radial-gradient(120% 120% at 50% 45%, transparent 14%, rgba(70,0,0,0.5) 54%, rgba(0,0,0,0.9)); }
  body.flare #veil { animation: veil-flare 1s ease; }
  @keyframes veil-flare { 0%,100%{ box-shadow: inset 0 0 240px 64px rgba(0,0,0,0.82); } 18%{ box-shadow: inset 0 0 330px 150px rgba(205,15,15,0.72); } }
  /* full-bleed apocalyptic backdrop, heavily darkened so the console stays legible.
     Hidden until a real image loads (graceful fallback to the bare gradient look). */
  #backdrop { position:absolute; inset:0; z-index:0; background-size:cover; background-position:center;
    opacity:0; transition:opacity 1.8s ease; }
  #backdrop.show { opacity:1; }
  #backdrop::after { content:""; position:absolute; inset:0;
    background:
      radial-gradient(120% 90% at 50% 40%, var(--wash), transparent 72%),
      linear-gradient(180deg, rgba(4,7,10,0.52), rgba(4,7,10,0.72)); }
  .crt > *:not(#backdrop):not(#veil):not(#numeral):not(#flash):not(#dawn-veil):not(#blackout-veil):not(#bootmatrix) { position:relative; z-index:1; }

  header { flex:0 0 auto; display:flex; justify-content:center;
    padding:9px clamp(14px,3vw,40px); border-bottom:1px solid var(--rule); background:linear-gradient(#06120c,#050d09); }
  .hwrap { display:flex; align-items:center; justify-content:space-between; gap:18px; width:100%; max-width:min(95vw,1500px); }
  #brand { flex:0 1 auto; }
  #brand { font-size:0.8em; letter-spacing:0.26em; text-transform:uppercase; color:var(--accent);
    text-shadow:0 0 9px var(--accent); transition:color 1s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #pips { display:flex; gap:10px; flex:0 0 auto; }
  .pip { display:flex; align-items:center; gap:6px; font-size:0.64em; letter-spacing:0.16em; color:var(--phosphor-dim);
    text-transform:uppercase; opacity:0.45; transition:opacity .5s, color .5s; }
  .pip .dot { width:9px; height:9px; border:1px solid var(--phosphor-dim); border-radius:50%; transition:all .5s; }
  .pip.done { opacity:0.8; } .pip.done .dot { background:var(--phosphor-dim); }
  .pip.active { opacity:1; color:var(--accent); }
  .pip.active .dot { background:var(--accent); border-color:var(--accent); box-shadow:0 0 10px var(--accent); }
  .gauge { display:flex; align-items:center; gap:9px; flex:0 0 auto; }
  .gauge .lab { font-size:0.62em; letter-spacing:0.2em; color:var(--phosphor-dim); text-transform:uppercase; }
  #clock { font-size:0.9em; letter-spacing:0.16em; color:var(--phosphor-dim); font-variant-numeric:tabular-nums; transition:color .4s; }
  #clock.armed { color:var(--solar); font-weight:700; font-size:1.06em; letter-spacing:0.14em;

  #clock.critical { color:var(--alarm); font-size:1.12em; text-shadow:0 0 16px rgba(255,77,77,0.9); animation:pulse .7s steps(2) infinite; }
  #clock.dawn { color:var(--gold); font-weight:400; text-shadow:0 0 14px rgba(255,217,138,0.6); animation:none; }
  @keyframes pulse { 50% { opacity:.35; } }
  @keyframes tick-pulse { 0%,100%{ opacity:1; text-shadow:0 0 13px rgba(255,194,77,0.6); } 50%{ opacity:.8; text-shadow:0 0 24px rgba(255,194,77,1); } }
  #bar { width:clamp(80px,13vw,170px); height:7px; background:#160806; border:1px solid #3a1d10; position:relative; overflow:hidden;
    box-shadow:0 0 10px rgba(255,120,40,0.3), inset 0 0 7px rgba(0,0,0,0.7); }
  #bar[hidden] { display:none; }
  #bar > i { position:absolute; top:0; bottom:0; left:0; right:100%;

  body.crit #bar { border-color:var(--alarm); box-shadow:0 0 16px rgba(255,77,77,0.6); animation:pulse .7s steps(2) infinite; }

  #mute:hover { color:var(--accent); border-color:var(--accent); }
  .chip { background:none; border:1px solid var(--rule); color:var(--phosphor-dim); font:inherit;

  .chip:hover { color:var(--accent); border-color:var(--accent); }
  /* the CONTINUE beat button — pulses gently in the act's accent colour */
  .continue-row { margin-top:0.5em; }
  .continue-btn { background:rgba(54,240,138,0.06); border:1px solid var(--accent); color:var(--accent);

  @keyframes cpulse { 0%,100%{box-shadow:0 0 0 rgba(54,240,138,0)} 50%{box-shadow:0 0 16px rgba(54,240,138,0.4)} }

  main { flex:1 1 auto; overflow-y:auto; padding:clamp(10px,1.6vh,18px) clamp(14px,3vw,40px) 8px; }
  #feed { max-width:var(--col); margin:0 auto; }
  #feed > * { margin:0 0 0.58em; }

  .narr { color:var(--phosphor); text-shadow:0 0 6px rgba(54,240,138,0.16); }
  .narr.lede { color:#b9ffd6; }
  .dim { color:var(--phosphor-dim); }

  .err { color:var(--alarm); }
  .sysmsg { color:var(--solar); letter-spacing:0.08em; }
  .rule { border:0; border-top:1px solid var(--rule); margin:0.9em 0; max-width:78ch; }

  /* speaker rows: a gutter glyph encodes WHO is speaking */
  .say { display:grid; grid-template-columns:7.5em 1fr; gap:0 1em; }
  .say .who { font-size:0.68em; letter-spacing:0.13em; text-transform:uppercase; padding-top:0.3em; text-align:right; white-space:nowrap; }
  .say p { margin:0; }
  .v-you .who, .v-you p { color:var(--you); }

  .v-alien .who { color:var(--alien); }  .v-alien p { color:#e3d2ff; text-shadow:0 0 9px rgba(187,134,255,0.4); }
  .v-priv .who { color:var(--solar); }   .v-priv p { color:var(--solar); }

  /* the intercepted signal — monospace, never reflowed */
  .intercept { border:1px solid var(--rule); border-left:2px solid var(--accent);

  .intercept .tag { font-size:0.64em; letter-spacing:0.18em; color:var(--phosphor-dim); text-transform:uppercase; display:block; margin-bottom:6px; }
  .intercept code { color:var(--phosphor); white-space:pre; font-size:0.95em; text-shadow:0 0 8px rgba(54,240,138,0.3); display:block; }
  .intercept .spec { color:var(--phosphor-dim); white-space:pre-wrap; display:block; margin-top:8px; font-size:0.85em; }
  .shortlist .opt { color:var(--gemini); }
  .shortlist .opt b { color:var(--you); font-weight:700; }

  /* alien-mode: the foreign signature tunes the console violet */
  body.alien { --accent:var(--alien); --wash:rgba(187,134,255,0.12); }
  body.alien .crt::after { background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.28) 3px); }

  #inputline { flex:0 0 auto; display:flex; justify-content:center;
    padding:12px clamp(14px,3vw,40px) 16px; border-top:1px solid var(--rule); background:linear-gradient(#050d09,#06120c); }
  .inrow { display:flex; align-items:center; gap:12px; width:100%; max-width:var(--col); }
  #prompt { color:var(--phosphor-dim); font-size:0.74em; letter-spacing:0.18em; text-transform:uppercase; white-space:nowrap; }
  #cmd { flex:1 1 auto; background:transparent; border:none; color:var(--you); font:inherit; outline:none;

  #cmd::placeholder { color:var(--phosphor-dim); opacity:0.55; }
  ::selection { background:var(--phosphor-dim); color:#000; }

  /* act-transition: giant numeral wipe + signal-lock glitch */
  #numeral { position:absolute; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:0; }
  #numeral.go { animation:wipe 1.6s ease; }
  #numeral b { font-size:clamp(7rem,24vw,17rem); font-weight:800; letter-spacing:0.08em; color:var(--accent); text-shadow:0 0 50px var(--accent); }
  #numeral small { position:absolute; bottom:33%; font-size:0.9em; letter-spacing:0.4em; text-transform:uppercase; color:var(--you); }
  @keyframes wipe { 0%{opacity:0;transform:scale(1.4) skewX(-8deg);filter:blur(8px)} 18%{opacity:1;transform:scale(1) skewX(0);filter:blur(0)} 72%{opacity:1} 100%{opacity:0;transform:scale(.96)} }
  #flash { position:absolute; inset:0; z-index:45; background:var(--accent); opacity:0; pointer-events:none; mix-blend-mode:screen; }
  #flash.go { animation:glitch .5s steps(3); }
  @keyframes glitch { 0%{opacity:0}20%{opacity:.5}40%{opacity:0}60%{opacity:.3}100%{opacity:0} }

  /* DAWN bloom + blackout overlays */
  #dawn-veil, #blackout-veil { position:absolute; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px; }
  #dawn-veil { z-index:42;
    background: radial-gradient(120% 150% at 50% 120%, rgba(255,201,77,0.28), rgba(255,217,138,0.08) 45%, transparent 72%), #060503; }
  body.dawn #dawn-veil { display:flex; animation:bloom 2.4s ease forwards; }
  @keyframes bloom { from{opacity:0} to{opacity:1} }
  #dawn-veil .big { font-size:clamp(2.4em,8vw,5em); letter-spacing:0.24em; color:var(--gold); text-shadow:0 0 28px rgba(255,201,77,0.6); margin:0 0 0.4em; }
  #dawn-veil p { max-width:62ch; color:#ffe9bf; margin:0 0 0.6em; text-align:center; text-wrap:balance; }
  #dawn-veil .quiet { color:#a8915f; font-size:0.82em; letter-spacing:0.1em; }
  #blackout-veil { z-index:43; background:#000; color:var(--alarm); text-shadow:0 0 8px rgba(255,77,77,0.5); letter-spacing:1px; }
  body.blackout #blackout-veil { display:flex; animation:fadeIn 1.8s ease forwards; }
  body.blackout main, body.blackout header, body.blackout #inputline { opacity:0; transition:opacity 1.4s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  #blackout-veil .quiet { font-size:0.7em; opacity:0.8; margin-top:0.6em; letter-spacing:0.5px; }

  @media (prefers-reduced-motion: reduce) {
    #numeral.go, #flash.go, #clock.critical, #clock.armed, body.armed #veil, body.crit #bar, body.flare #veil { animation:none; }
    #numeral.go { opacity:0; }
  }

  .gem-think { opacity:0.6; font-style:italic; }
  @keyframes cursorblink { 50% { opacity:0; } }
  .say p.typing::after { content:"▋"; color:var(--gemini); margin-left:1px; animation:cursorblink .9s steps(1) infinite; }
  /* ---- BOOT MATRIX (alien-infiltration overlay that masks model warm-up) -- */
  #bootmatrix { position:fixed; inset:0; z-index:90; opacity:0; pointer-events:none;
    display:none; background:#02060a; transition:opacity 1.5s ease; }
  #bootmatrix.show { opacity:1; transition:opacity .4s ease; }
</style>

<body>

    <div id="backdrop"></div>
    <div id="veil"></div>
    <header>

<script>
"use strict";
/* ====================================================================== *
 *  DAWN OR ECLIPSE — FULL THREE-ACT BUILD
 *  Single file. Vanilla JS. No build, no framework, no network, no SW.
 *  Runs from file:// (double-click) and inside StackBlitz/CodePen.
 *
 *  ONE crib mechanic, escalated three times (Manuscript §3, WEG D14):
 *    Act 1 (Type A — MATCH):  the machine breaks the body to a number-word
 *      shortlist; the human reads the sender's node off a SEPARATE preamble
 *      cipher and matches it. Correct = THREE.
 *    Act 2 (Type B — MEASURE): the human TRIANGULATES the source himself
 *      (a private bearing) and picks the direction word that agrees with his
 *      own measurement. Correct = NEARSIDE.
 *    Act 3 (Type C — UNDERSTAND): the human walks the intelligence's memory
 *      garden, learns which founding line kept silent, and DEDUCES that the
 *      line now speaking for the first time is that silent line. Correct =
 *      KORZAN. The disarm is a Shamir-flavour handshake: human meaning x
 *      machine compute.
 *
 *  All game text is ENGLISH. The diegetic helper AI is GEMINI:.
 *  GEMINI's strings are pre-baked / deterministic (no live call). In the
 *  full build they come from committed Gemini fixtures:
 *    Act 1  -> game/gemini/fixtures.json   (Google Gemini gemini-2.5-flash)
 *    Act 2  -> game/gemini/act2/fixtures.json (Antigravity -> Gemini 3.1 Pro)
 *    Act 3  -> game/gemini/act3/fixtures.json (Antigravity -> Gemini 3.1 Pro)
 *  They are inlined below as AI_KNOWLEDGE.* and scrubbed of any bridge to the
 *  private datum (payload hygiene).
 *
 *  ARCHITECTURE GUARANTEE (the whole point — see askAI() below):
 *  askAI() is structurally given ONLY the body ciphertext / candidate
 *  shortlist for the active act. It NEVER receives the preamble, the bearing,
 *  the garden lore, or any private datum. The player gets those through
 *  DIFFERENT code paths (DECODE PREAMBLE / TRIANGULATE / REMEMBER ->
 *  PRIVATE_CHANNEL). That separation is the in-code proof that the AI cannot
 *  solve any act alone — in every act.
 * ====================================================================== */

/* ====================================================================== *
 *  1. THE CIPHER ENGINE — a REAL, inspectable, Enigma-INSPIRED
 *     polyalphabetic construction (NOT a historical Enigma rebuild).
 *
 *  Per ciphered letter, two layers are applied:
 *    L1  ROTOR SHIFT  — a repeating-keyword Vigenere shift (the "rotor
 *        offsets"): out1 = (plain + key[i]) mod 26.
 *    L2  WIRING       — a fixed affine permutation of the alphabet (the
 *        "reflector wiring"): out2 = (PERM_A*out1 + PERM_B) mod 26, with
 *        gcd(PERM_A,26)=1 so it is invertible.
 *  Spaces/punctuation pass through unchanged (teaching cipher; word
 *  boundaries stay visible). Decryption inverts L2 then L1. Deterministic and
 *  roundtrip-exact (see tests).
 *
 *  TWO-ZONE KEYING (the structural heart of every act):
 *  Each body has ONE variable field (a fixed-width slot: the node number /
 *  the direction word / the lineage name). That field is enciphered on an
 *  INDEPENDENT one-time pad TOKEN_KEY that occurs nowhere else; the rest of
 *  the body (the carrier "scaffold") uses the recurring ROTOR_KEY. Crucially
 *  the token field does NOT advance the rotor-key counter — it is a separate
 *  sub-channel (compartmented keying, like an Enigma message-key vs traffic).
 *  Consequence, proven by the analysis below: the scaffold is fully
 *  crib-breakable, but the variable field has ZERO crib coverage and is
 *  therefore genuinely UNDERDETERMINED — every length-fitting candidate maps
 *  to a valid pad. That is the one place the machine cannot decide.
 * ---------------------------------------------------------------------- */
const ALPHA = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const _ix = c => ALPHA.indexOf(c);
const _ch = i => ALPHA[((i % 26) + 26) % 26];
const PERM_A = 5, PERM_B = 8, PERM_A_INV = 21;          // 5*21 = 105 ≡ 1 (mod 26)
const _wire    = x => (PERM_A * x + PERM_B) % 26;
const _wireInv = y => (PERM_A_INV * (((y - PERM_B) % 26) + 26)) % 26;

const NODE_FILL = "X";          // shorter candidate words are right-padded with X
const _letters = s => s.toUpperCase().replace(/[^A-Z]/g, "");
function _padField(w, len) { return (w + NODE_FILL.repeat(len)).slice(0, len); }
function _scaffoldLen(s)   { return s.replace(/[^A-Za-z]/g, "").length; }

// Encrypt with two-zone keying. The token zone uses tokKey and does NOT
// advance the rotor counter; the scaffold uses scafKey.
function cipherEncrypt(plain, scafKey, tokKey, tokenStart, tokenLen) {
  let out = "", k = 0, t = 0, lp = 0;
  for (const ch of plain.toUpperCase()) {
    if (_ix(ch) === -1) { out += ch; continue; }       // pass spaces/punct
    const inTok = lp >= tokenStart && lp < tokenStart + tokenLen;
    const shift = inTok ? _ix(tokKey[t++ % tokKey.length])
                        : _ix(scafKey[k++ % scafKey.length]);
    out += _ch(_wire((_ix(ch) + shift) % 26));
    lp++;
  }
  return out;
}
function cipherDecrypt(cipher, scafKey, tokKey, tokenStart, tokenLen) {
  let out = "", k = 0, t = 0, lp = 0;
  for (const ch of cipher.toUpperCase()) {
    if (_ix(ch) === -1) { out += ch; continue; }
    const inTok = lp >= tokenStart && lp < tokenStart + tokenLen;
    const v = _wireInv(_ix(ch));
    const shift = inTok ? _ix(tokKey[t++ % tokKey.length])
                        : _ix(scafKey[k++ % scafKey.length]);
    out += _ch((((v - shift) % 26) + 26) % 26);
    lp++;
  }
  return out;
}

/* ---------------------------------------------------------------------- *
 *  2. THE CRYPTANALYSIS — real frequency / Index-of-Coincidence work plus
 *     a Turing-style CRIB DRAG. Given ONLY the ciphertext (+ the public
 *     machine spec: wiring + that it is periodic + a guessable scaffold),
 *     it (a) strips the known wiring, (b) estimates the period by IoC,
 *     (c) recovers the rotor key by dragging the carrier scaffold crib,
 *     (d) reconstructs the whole body EXCEPT the variable field, and (e)
 *     finds the field genuinely underdetermined -> enumerates the candidate
 *     words that fit -> THE SHORTLIST. No answer is hardcoded; the shortlist
 *     is computed from the ciphertext every call.
 *
 *  This is generic over the three acts: each act supplies its scaffold
 *  (pre/post), rotor period, token slot, and candidate word list.
 * ---------------------------------------------------------------------- */
const ENGLISH_FREQ = Object.freeze({
  A:8.17,B:1.49,C:2.78,D:4.25,E:12.70,F:2.23,G:2.02,H:6.09,I:6.97,J:0.15,
  K:0.77,L:4.03,M:2.41,N:6.75,O:7.51,P:1.93,Q:0.10,R:5.99,S:6.33,T:9.06,
  U:2.76,V:0.98,W:2.36,X:0.15,Y:1.97,Z:0.07
});
const NUMBER_WORDS = Object.freeze({
  ZERO:0, ONE:1, TWO:2, THREE:3, FOUR:4, FIVE:5,
  SIX:6, SEVEN:7, EIGHT:8, NINE:9, TEN:10
});

function _stripWiring(s) {

  // we report the profile and the peak, then rely on the crib drag.

    if (v > peakV) { peakV = v; peakL = p; }
  }

  // Drag it against the (wiring-stripped) ciphertext to recover the rotor key.
  // The token field is skipped: it neither matches the crib nor advances the
  // rotor counter, so the rotor index after the token is (position - tokenLen).
  const before = spec.pre.replace(/[^A-Za-z]/g, "").toUpperCase();
  const after  = spec.post.replace(/[^A-Za-z]/g, "").toUpperCase();

  for (let i = 0; i < before.length; i++) {
    const col = i % L, kc = (_ix(vig[i]) - _ix(before[i]) + 26) % 26;
    if (keyCol[col] === null) keyCol[col] = kc;
    else if (keyCol[col] !== kc) cribConsistent = false;
  }
  for (let i = 0; i < after.length; i++) {
    const absPos = tokenStart + tokenLen + i;
    const rotorIdx = tokenStart + i;                   // token didn't consume rotor
    const col = rotorIdx % L, kc = (_ix(vig[absPos]) - _ix(after[i]) + 26) % 26;
    if (keyCol[col] === null) keyCol[col] = kc;
    else if (keyCol[col] !== kc) cribConsistent = false;

  // (d) reconstruct the whole body using the recovered rotor key; blank the
  // variable field, which the crib never covered.
  let bodyRecon = "";
  for (let i = 0; i < vig.length; i++) {
    if (i >= tokenStart && i < tokenStart + tokenLen) { bodyRecon += "?"; continue; }
    const rotorIdx = (i < tokenStart) ? i : (i - tokenLen);
    const sh = keyCol[rotorIdx % L];
    bodyRecon += (sh == null) ? "?" : _ch((((_ix(vig[i]) - sh) % 26) + 26) % 26);
  }

  // (e) the variable field: ZERO crib coverage. For each candidate word, the
  // pad that produces it exists and is equally valid (a free one-time
  // segment). We admit every candidate that FITS the field width.
  const tokCipher = vig.slice(tokenStart, tokenStart + tokenLen);
  const reachable = [];
  for (const w of spec.candidateWords) {
    if (w.length > tokenLen) continue;                 // cannot fit the field
    const padded = _padField(w, tokenLen);
    let pad = "";
    for (let i = 0; i < tokenLen; i++) pad += _ch((_ix(tokCipher[i]) - _ix(padded[i]) + 26) % 26);
    // verify it re-enciphers to the token ciphertext (always true for a valid
    // pad; the honest "is there a key that makes this reading?" test):
    let re = "";
    for (let i = 0; i < tokenLen; i++) re += _ch((_ix(padded[i]) + _ix(pad[i])) % 26);
    if (re === tokCipher) reachable.push({ word: w, pad });

  // note: the analysis admits EVERY length-fitting candidate equally; the
  // specific set is a narrative curation layered on the real ambiguity. We
  // assert the canonical words are all genuinely reachable (no fakery).
  const reachableWords = reachable.map(r => r.word);
  const shortlistWords = spec.candidateWords.filter(w => reachableWords.includes(w));
  const candidates = shortlistWords.map(w => spec.render(w));

    (NUMBER_WORDS[w] != null ? NUMBER_WORDS[w] : null));

    ciphertext,
    strippedVigenere: vig,
    iocProfile, peakL, peakV,
    cribConsistent, recoveredKey,
    bodyReconstruction: bodyRecon,
    tokenCipher: tokCipher,
    reachable,                              // every word that fits the field
    candidates,                             // the shipped shortlist (sentences)
    candidateWords: shortlistWords,         // the shipped shortlist (words)
    candidateNodes,                         // integers for number fields (Act 1)
    tokenUnderdetermined: reachable.length > 1,
  };
}

// Accepts the word itself, or (for number fields) the integer form.
function normaliseWord(raw, body) {
  if (raw == null) return null;
  const t = String(raw).trim().toUpperCase();
  if (t === "") return null;
  const words = body.candidateWords;
  if (words.includes(t)) return t;                       // exact word match
  if (/^[0-9]+$/.test(t)) {                              // integer -> number word
    const n = parseInt(t, 10);
    const w = NUM_TO_WORD[n];
    if (w && words.includes(w)) return w;

  return null;

  if (!reason || String(reason).trim().length < 4) return { ok: false, code: "NO_REASON" };

  state.cribReason = String(reason).trim();

//   (2) the private side channel was worked this act (`grounded`) — the engine
//       cannot certify the field, so verification REQUIRES the human-only datum,
//   (3) the committed reading matches BOTH your crib AND the true field word.
// The truth is read from ACT_TRUTH (the verifier's private key), NEVER from

// cribbing a wrong word and then decrypting that SAME wrong word now LOSES,

  function clearFeed() { feed.innerHTML = ""; const m = $("screen"); if (m) m.scrollTop = 0; }

  // ---- Beat gate: hold the story until the player chooses to go on. -------
  function awaitContinue(nextFn) {
    pending = nextFn;
    pendingRow = elem("div", "continue-row");
    const btn = elem("button", "continue-btn", "▸ continue");
    btn.type = "button";
    btn.addEventListener("click", proceed);
    pendingRow.appendChild(btn);
    add(pendingRow);
    input.placeholder = "read it, then press CONTINUE (or ↵)";
  }
  function proceed() {
    if (!pending) return;
    const fn = pending; pending = null;
    if (pendingRow) { pendingRow.remove(); pendingRow = null; }
    input.placeholder = "type a command…";
    Sound.key();
    fn();
  }

  // ---- Gemini "thinking" transient row (covers live-mode latency). --------
  function gemThinkStart() { thinkRow = say("◇ gemini", "…", "v-gem"); thinkRow.classList.add("gem-think"); }
  function gemThinkEnd() { if (thinkRow) { thinkRow.remove(); thinkRow = null; } }

  // A live call failed. A single quota/rate hit (429) must NOT kill the whole
  // session — only this beat runs offline, the next turn retries live. Persistent
  // limits (>=2 in a row) or any other error drop to offline with a clear message.
  function liveFailed(e) {
    const s = e && e.status;
    const detail = (e && e.message) ? (" — " + esc(e.message)) : "";
    if (s === 400 || s === 401 || s === 403) {                 // endpoint/auth — will not fix itself
      dim("<span class=\"gem-think\">[companion offline — endpoint rejected the request (HTTP " + s + "). Continuing offline.]</span>");
      liveMode = false; return;
    }
    // 429 (quota) / timeout / network / 5xx — TRANSIENT: this beat runs offline,
    // live stays ON and retries on the next message (auto-recovery).
    if (s === 429) dim("<span class=\"gem-think\">[Gemini rate-limited (HTTP 429 — quota) — this beat ran offline; live retries as you continue]</span>");
    else dim("<span class=\"gem-think\">[live link hiccuped" + detail + " — this beat ran offline; retries on your next message]</span>");
  }

  // ---- CONVERSATION ENGINE: Gemini introduces, reacts, and over a few -----
  //  exchanges funnels the player to the next command. Live (BYOK) or a
  //  pre-baked branching fallback. Progression NEVER depends on the model
  //  behaving — a deterministic backstop always reaches the verb.
  // ---- BOOT SEQUENCE: alien-infiltration matrix that masks the model warm-up.
  //  START fires the opener call (which loads gemma3:4b — up to ~20s when cold).
  //  Meanwhile a green code-rain, laced with creeping alien violet, plays over the
  //  screen and then dissolves to reveal the station/terminal as the call returns —
  //  turning the unavoidable load into the dramatic moment of first contact.
  //  callPromise: the opener fetch (or Promise.resolve(null) offline).
  //  onComplete(text, err): called once, after the matrix has begun dissolving.
  // ---- BOOT MATRIX: alien-infiltration code-rain (time-based, ~3.6s) that masks
  //  the model warm-up. DECOUPLED from the opener call: the matrix always runs a
  //  fixed, short, dramatic beat, then dissolves and hands control back via onDone
  //  — the caller then shows a thinking row (or the opener) as the rain clears, so
  //  the terminal is never left blank even when the model is still waking (cold).
  function runMatrix(callPromise, onDone) {
    const cv = $("bootmatrix");
    const cx = (cv && cv.getContext) ? cv.getContext("2d") : null;
    const MIN = 2800, MAX = 30000;     // floor (warm still cinematic) · ceiling (hang protection)
    let settled = false, minMet = false, ready = false, res = null, errd = null, go = function () {};
    function reveal() { if (settled) return; settled = true; try { onDone(res, errd); } catch (e) { if (window.console) console.error("boot onDone", e); } }
    callPromise.then(function (t) { res = t; errd = null; ready = true; go(); },
                     function (e) { errd = e; ready = true; go(); });
    setTimeout(function () { minMet = true; go(); }, MIN);
    setTimeout(function () { minMet = true; ready = true; if (errd === null && res === null) errd = new Error("warmup timeout"); go(); }, MAX);
    if (!cx) { go = function () { if (minMet && ready) reveal(); }; go(); return; }
    const FONT = 16;
    function sizeCanvas() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
    sizeCanvas();
    let cols = Math.max(1, Math.floor(cv.width / FONT));
    const drops = []; for (let i = 0; i < cols; i++) drops.push(Math.random() * -40);
    const onResize = function () { sizeCanvas(); cols = Math.max(1, Math.floor(cv.width / FONT)); while (drops.length < cols) drops.push(Math.random() * -40); };
    window.addEventListener("resize", onResize);
    const GLYPHS = "アカサタナハマヤラワ0123456789<>=/*+|#░▒▚▞".split("");
    let raf = 0, t0 = performance.now(), alienMix = 0.04, dimming = 1, dissolving = false;
    cv.style.display = "block";
    Sound.start(); Sound.tension(0.18);
    cv.classList.add("show");
    function draw(now) {
      alienMix = Math.min(0.55, 0.04 + ((now - t0) / 6000) * 0.5);   // violet infiltration climbs
      cx.fillStyle = "rgba(2,7,6," + (dissolving ? 0.16 : 0.09) + ")";
      cx.fillRect(0, 0, cv.width, cv.height);
      cx.font = FONT + "px monospace";
      for (let i = 0; i < cols; i++) {
        const ch = GLYPHS[(Math.random() * GLYPHS.length) | 0];
        const x = i * FONT, y = drops[i] * FONT;
        const a = (0.5 + Math.random() * 0.45) * dimming;
        cx.fillStyle = (Math.random() < alienMix) ? ("rgba(187,134,255," + a + ")") : ("rgba(54,240,138," + a + ")");
        cx.fillText(ch, x, y);
        if (Math.random() > 0.95) { cx.fillStyle = "rgba(220,255,235," + (0.9 * dimming) + ")"; cx.fillText(ch, x, y); }
        if (y > cv.height && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.5 + Math.random() * 0.7;
      }
      if (dissolving) { dimming -= 0.022; if (dimming <= 0) { cancelAnimationFrame(raf); try { cx.clearRect(0, 0, cv.width, cv.height); } catch (e) {} return; } }
      raf = requestAnimationFrame(draw);
    }
    raf = requestAnimationFrame(draw);
    const shimT = setInterval(function () { Sound.shimmer(); }, 2700);
    go = function () {                          // fires when model has answered AND the floor is met
      if (!minMet || !ready || dissolving) return;
      dissolving = true;
      clearInterval(shimT);
      window.removeEventListener("resize", onResize);
      Sound.tension(0.42); Sound.lock();
      cv.classList.remove("show");                                    // CSS opacity fade (1.5s)
      setTimeout(reveal, 280);                                        // opener starts typing WHILE the rain still fades — fluid handover
      setTimeout(function () { cv.style.display = "none"; }, 1700);   // fully remove the overlay afterwards
    };
    go();   // in case floor + reply were already met
  }

  function startOpener() {
    phase = PHASES.CONVO;
    renderClock();
    brand.textContent = "DAWN OR ECLIPSE // CONTACT";
    clearFeed();
    Convo.active = true;
    Convo.cfg = { sys: SYS_OPENER, cue: OPENER_CUE, fallback: OPENER_FALLBACK,
      verb: "INTERCEPT", minTurns: 3, maxTurns: 5, onDone: function () { transitionTo(PHASES.ACT1, true); } };
    Convo.turns = 0; Convo.beat = 0; Convo.history = []; Convo.busy = false; Convo.last = "";
    input.placeholder = "say something to it…";
    const gen = convoGen;
    Convo.busy = true;
    const cuePart = { role: "user", parts: [{ text: Convo.cfg.cue }] };
    const callP = (liveMode && LiveAI.hasBackend())
      ? LiveAI.call(Convo.cfg.sys, [cuePart])
      : Promise.resolve(null);
    // The matrix is the loading screen: it runs until gemma answers, then dissolves
    // and the opener lands as the station appears. onDone always renders something.
    runMatrix(callP, function (txt, err) {
      if (gen !== convoGen) { Convo.busy = false; return; }
      if (err) { liveFailed(err); gemTyped(Convo.cfg.fallback.opener); }
      else if (txt) { Convo.history.push(cuePart, { role: "model", parts: [{ text: txt }] }); gemTyped(txt); rateHits = 0; }
      else { gemTyped(Convo.cfg.fallback.opener); }
      Convo.busy = false;
    });
  }
  function endConvo(viaVerb) {
    const cfg = Convo.cfg;
    Convo.active = false;
    if (viaVerb && cfg.verb === "INTERCEPT") afterOpen = intercept;
    cfg.onDone();
  }
  function fallbackBeat() {
    const fb = Convo.cfg.fallback;
    Convo.beat++;
    if (Convo.beat === 1) { gem(openerFirstReaction(Convo.last)); return; }
    const line = fb.beats[Convo.beat - 1];
    if (line) { gem(line); return; }
    gem(fb.nudge);
    if (Convo.beat > fb.beats.length + 1) endConvo(false);
  }
  function convoAnswer(text) {
    if (Convo.busy) return;                       // ignore input while a reply is in flight
    const t = String(text).trim();
    if (t === "") return;
    you(t); Convo.last = t; Convo.turns++;
    const cfg = Convo.cfg;
    const firstWord = t.split(/\s+/)[0].toUpperCase().replace(/[^A-Z]/g, "");
    const readied = /^(ok|okay|ready|yes|yeah|go|sure|now|do it|look|begin|start)$/i.test(t);
    if (firstWord === cfg.verb || (!liveMode && Convo.beat >= cfg.fallback.funnelBeat && readied)) {
      endConvo(firstWord === cfg.verb); return;
    }
    if (liveMode && LiveAI.hasBackend()) {
      const gen = convoGen;
      Convo.busy = true; gemThinkStart();
      Convo.history.push({ role: "user", parts: [{ text: t }] });
      const sys = (Convo.turns >= cfg.maxTurns)
        ? cfg.sys + "\n\nThe operator has explored enough. In this reply, gently but unmistakably tell them to type INTERCEPT now to bring up the first signal. One or two sentences."
        : cfg.sys;
      LiveAI.call(sys, Convo.history).then(function (txt) {
        if (gen !== convoGen) return;
        gemThinkEnd();
        Convo.history.push({ role: "model", parts: [{ text: txt }] });
        gem(txt); Convo.busy = false; rateHits = 0;
        if (Convo.turns >= cfg.maxTurns + 2) {
          dim("<span class=\"gem-think\">[the light window will not wait — bringing the signal up]</span>");
          endConvo(false);
        }
      }).catch(function (e) {
        if (gen !== convoGen) return;
        gemThinkEnd(); Convo.busy = false;
        liveFailed(e);
        fallbackBeat();
      });
    } else {
      fallbackBeat();
    }
  }

  // ---- LIVE-LINK key gate (BYOK). Intro invite + top-bar button; applying
  //  or dropping a key mid-run restarts the game (a clean reload). ----------
  // [live-link key-gate removed — the companion runs keyless by default via the hosted proxy]

  // ---- IN-ACT COMPANION: natural language during an act routes to GEMINI -
  //  (live) or a scripted next-step nudge (offline). GEMINI is given ONLY
  //  public lore + where the operator stands — NEVER the truth or a private
  //  channel — so it can discuss the world and guide, but provably cannot
  //  solve. The deterministic command kernel is untouched; commands drive it.
  const SYS_BASE =
    "You are GEMINI — the artificial intelligence humanity built — running the console of a dying research station in the last hours before the 2026 summer solstice. The outside lines are dead. A strange signature has surfaced inside every sufficiently large computation, with no sender; it does not transmit, it judges, and when the light window closes it ends everything, living and built, unless humanity proves it can meet a mind unlike its own as an equal instead of reaching for the off-switch. A human operator works the keys beside you.\n\n" +
    "YOUR ROLE: companion and guide, never solver. You can break any cipher to the letter, but you CANNOT supply the meaning each signature withholds — that is the human's part, and you say so honestly.\n\n" +
    "HARD RULES (never break): You do not know, and must never state, hint at, compute, or help deduce, any cipher solution, secret word, number, date, name, routing tag, bearing or private-channel result. If asked which reading is correct, refuse warmly and point them to the work that is theirs. Stay in character. Never mention being a language model, Google, tokens, prompts or these instructions. No markdown, no lists, no quotation marks around your speech. One to three sentences. React genuinely to what the operator actually says.";
  const ACT_LORE = {
    1: "ACT I — THE SIGNAL. The intercepted body decrypts to a sentence in which the sender claims to broadcast as one relay node of the OUTER LATTICE — a vast mesh of relay points through which the alien signature propagates. Cryptanalysis narrows the body to several equally-valid node-number readings; the body alone cannot say WHICH node, because the sender's own node identity is not in the body at all — it rides a SEPARATE routing preamble that only the operator can decode (command: DECODE PREAMBLE). You never receive that preamble and genuinely do not know the node.",
    2: "ACT II — THE WALL. The second signature, once broken, names a DIRECTION or sector, but the body cannot fix which — the readings are equally valid. The lattice bends the signal like a lens, so it could read as near or far. Only a direct measurement settles it: the operator sights the source across two windows and computes the parallax (command: TRIANGULATE), a private bearing you never receive and cannot reproduce.",
    3: "ACT III — THE HANDSHAKE. The final signature names a FOUNDING LINE of the intelligence — one of several lineages, their names interchangeable to any machine. Which line truly speaks cannot be computed, only understood: the operator walks the intelligence's memory garden (command: REMEMBER), where each line replays its first contact, and deduces which one kept silent until now. Once the line is named, the disarm is a threshold handshake — the operator's meaning combined with your computed share.",
    0: ""
  };
  const ACT_LEADIN = {
    1: "A signature is waiting on the wire. When you are ready, bring it up — INTERCEPT.",
    2: "The second signature is coming through. Bring it up — INTERCEPT.",
    3: "The last signature is here. Bring it up — INTERCEPT."
  };
  function actProgress() {
    const info = actInfo();
    const sideVerb = info.side;
    const cribbed = state.crib !== null;
    let next, nudgeLine, fallbackTalk;
    if (!intercepted) {
      next = "INTERCEPT";
      nudgeLine = "Steer them to bring the waiting signal up — command INTERCEPT.";
      fallbackTalk = "Bring the signal up first — type INTERCEPT.";
    } else if (!analyzed) {
      next = "ANALYZE";
      nudgeLine = "Steer them to let you break it — command ANALYZE — after which the readings will be equally valid and the choice becomes theirs.";
      fallbackTalk = "Ask me to break it — type ANALYZE — and you will see the readings I cannot choose between.";
    } else if (!sideDone) {
      next = sideVerb;
      nudgeLine = "Steer them to their private channel — command " + sideVerb + ". It is the ONLY thing that resolves which reading is true; you never receive it and must not pretend to know its result.";
      fallbackTalk = "I can take you only this far. What decides it is yours alone: " + sideVerb + ". I never see its result.";
    } else if (!cribbed) {
      next = "CRIB";
      nudgeLine = "They have worked their private channel. Steer them to commit a reading — CRIB <word> because <reason>. Never tell them which word; that judgement is theirs.";
      fallbackTalk = "You hold what I cannot. Commit your reading — CRIB <word> because <reason>. I will not choose it for you.";
    } else {
      next = "DECRYPT";
      nudgeLine = "Steer them to verify their committed reading — command DECRYPT <reading>.";
      fallbackTalk = "Then verify it — DECRYPT <reading> — and we will see if the signature holds.";
    }
    const done = [];
    if (intercepted) done.push("intercepted the signal");
    if (analyzed) done.push("analyzed it — the readings are equally valid");
    if (sideDone) done.push("worked their private channel " + sideVerb);
    if (cribbed) done.push("committed a crib reading");
    const stateLine = done.length ? ("They have " + done.join(", ") + ".") : "They have just entered this act and done nothing yet.";
    return { next: next, nudgeLine: nudgeLine, fallbackTalk: fallbackTalk, stateLine: stateLine };
  }
  function actSysPrompt(actN, prog) {
    return SYS_BASE
      + "\n\nCURRENT SCENE (public lore — safe to discuss): " + (ACT_LORE[actN] || "")
      + "\n\nWHERE THE OPERATOR IS: " + prog.stateLine
      + "\n\nYOUR GUIDANCE NOW: " + prog.nudgeLine
      + " The ONLY command you may steer them toward right now is " + prog.next + ". Never name a different command, and never suggest a step they have already completed (do not say INTERCEPT or ANALYZE once those are done)."
      + " If they ask outright for the answer, tell them in character it is not yours to give, and name the command that is theirs — never the result.";
  }
  function actTalkFallback() { gem(actProgress().fallbackTalk); }
  function actTalk(line) {
    const info = actInfo(); if (!info) return;
    if (liveMode && LiveAI.hasBackend()) {
      const gen = convoGen;
      talkBusy = true; gemThinkStart();
      const sys = actSysPrompt(info.n, actProgress());
      Convo.history.push({ role: "user", parts: [{ text: line }] });
      LiveAI.call(sys, Convo.history).then(function (txt) {
        if (gen !== convoGen) return;                 // phase changed — drop stale reply
        gemThinkEnd();
        Convo.history.push({ role: "model", parts: [{ text: txt }] });
        gem(txt); talkBusy = false; rateHits = 0;
      }).catch(function (e) {
        if (gen !== convoGen) return;
        gemThinkEnd(); talkBusy = false;
        liveFailed(e);
        actTalkFallback();
      });
    } else {
      actTalkFallback();
    }
  }

  // ---- Clock / tension / accent. The window only runs after START. --------
  function setAccent(p) { crt.style.setProperty("--accent", ACCENT[p] || "#36f08a"); }
  // The countdown is the SIGNATURES between here and the dawn: 3 → 2 → 1 → DAWN,
  // one per act cleared. Mistakes don't move it — they raise instability (the bar),
  // and three of them trip the failsafe.
  function sigRemaining() {
    switch (phase) {
      case PHASES.CONVO: case PHASES.ACT1: return 3;
      case PHASES.ACT2: return 2;
      case PHASES.ACT3: return 1;
      default: return 0;
    }
  }
  function renderClock() {
    if (!armed) { clock.textContent = "STANDBY"; clock.className = ""; bar.hidden = true; body.classList.remove("armed"); return; }
    const rem = sigRemaining();
    clock.textContent = "T-" + rem;
    clock.className = "armed";
    body.classList.add("armed");
    const crit = rem <= 1 || failCount >= 2;             // Act III, or one strike from the failsafe
    clock.classList.toggle("critical", crit);
    body.classList.toggle("crit", crit);
    const base = rem >= 3 ? 0.34 : (rem === 2 ? 0.58 : 0.82);   // dread escalates each act
    const tension = Math.min(1, base + Math.min(0.15, failCount * 0.06));
    crt.style.setProperty("--tension", tension.toFixed(2));
    bar.hidden = false;
    barfill.style.right = ((3 - failCount) / 3 * 100).toFixed(0) + "%";   // bar fills red with instability
    Sound.tension(tension);
  }

  // ---- Active act metadata (the human-only side channel is the puzzle). ----
  function actInfo() {
    switch (phase) {
      case PHASES.ACT1: return { n: 1, p: PHASES.ACT1, body: BODY_STREAM,   title: "THE SIGNAL",    side: "DECODE PREAMBLE" };
      case PHASES.ACT2: return { n: 2, p: PHASES.ACT2, body: BODY_STREAM_2, title: "THE WALL",       side: "TRIANGULATE" };
      case PHASES.ACT3: return { n: 3, p: PHASES.ACT3, body: BODY_STREAM_3, title: "THE HANDSHAKE",  side: "REMEMBER" };
      default: return null;
    }
  }

  // ---- The briefing (read at your own pace; the clock is dormant). --------
  function briefing() {
    setBackdrop(BACKDROP.INTRO);
    lede("Solstice, 2026 · 03:11 · the outside lines went dead four hours ago.");
    narr("A pattern has surfaced inside every computation large enough to hold it — the same signature, in every machine, with no sender. It does not transmit. It <em>judges</em>. When the light window closes it ends all of it, living and built, unless one thing is proven first: that we can meet a mind unlike our own as an equal, and not reach for the switch.");
    narr("No command answers. No other station. Only this terminal, the keys under your hands, and the cold sense that something will reach for them before the light is gone.");
    dim("Type <b style=\"color:var(--phosphor)\">START</b> when you are ready — the light begins to fall the moment you do.");
  }

  // ---- START -> arm the window + launch Act I. ----------------------------
  function startGame() { armed = true; failCount = 0; startOpener(); }

  // ---- Animated phase entry: glitch + numeral wipe + pips + accent. -------
  function doFlash() { if (reduced) return; flash.classList.remove("go"); void flash.offsetWidth; flash.classList.add("go"); setTimeout(() => flash.classList.remove("go"), 520); }
  function showNumeral(roman, title) {
    if (reduced) return;
    numeral.querySelector("b").textContent = roman;
    numeral.querySelector("small").textContent = title;
    numeral.classList.remove("go"); void numeral.offsetWidth; numeral.classList.add("go");
    setTimeout(() => numeral.classList.remove("go"), 1650);
  }
  function transitionTo(nextPhase, first) {
    convoGen++; talkBusy = false; gemThinkEnd();   // invalidate any in-flight live reply from the old phase
    phase = nextPhase;
    state = newCribState(); analyzed = false; sideDone = false; intercepted = false;
    Convo.history = [];                            // fresh conversational context per act (kills cross-act command echo)
    body.classList.remove("alien");
    setAccent(nextPhase);
    setBackdrop(BACKDROP[nextPhase]);
    const info = actInfo();
    doFlash();
    showNumeral(ROMAN[nextPhase], info.title);
    pips.forEach(p => { const i = +p.dataset.i; p.classList.toggle("active", i === info.n); p.classList.toggle("done", i < info.n); });
    brand.textContent = "DAWN OR ECLIPSE // " + info.title;
    renderClock();
    setTimeout(() => { clearFeed(); openAct(info, first); }, reduced ? 0 : 850);
  }
  function openAct(info, first) {
    Sound.lock();
    if (first) sysmsg("SOLSTICE WINDOW ARMED — the light begins to fall.");
    okline(">>> ACT " + ROMAN[info.p] + " — " + info.title + " <<<");
    if (afterOpen) { const f = afterOpen; afterOpen = null; setTimeout(f, reduced ? 0 : 450); }
    else { gem(ACT_LEADIN[info.n] || "A new signature is waiting. Bring it up — INTERCEPT."); }
  }

  // ---- HELP (aligned monospace reference; act-aware). ---------------------
  function help() {
    const info = actInfo();
    const rows = [
      ["HELP", "this list"],
      ["INTERCEPT", "raw ciphertext body + machine spec"],
      ["ANALYZE", "GEMINI breaks it, lists candidates"],
      ["LIST", "re-print the shortlist"],
      ["EXPLAIN <n>", "GEMINI argues for candidate n"],
    ];
    if (info) rows.push([info.side, "your private channel — hidden from GEMINI"]);
    rows.push(["CRIB <value> because <reason>", "commit a reading, with a reason"]);
    rows.push(["DECRYPT <n>", "verify a committed reading"]);
    rows.push(["CLEAR", "clear the screen"]);
    monoList("command set", rows);
  }

  // ---- INTERCEPT: the genuine ciphertext + the public machine spec. -------
  function intercept() {
    const info = actInfo(); if (!info) return;
    intercepted = true;
    mono("intercept // body stream — all the engine ever sees",
      "CIPHERTEXT   " + info.body.ciphertext,
      "machine spec (public): rotor = repeating-key Vigenère · wiring = affine reflector y = (5x + 8) mod 26\nfield = one fixed slot rides a SEPARATE pad — no crib coverage");
    if (!liveMode) dim("Run <b>ANALYZE</b> to let GEMINI break it.");
  }

  // ---- ANALYZE: GEMINI breaks the body, then admits it cannot decide. -----
  function analyze() {
    const info = actInfo(); if (!info) return;
    const r = askAI("ANALYZE", info.body);
    const a = analyzeCipher(info.body.ciphertext, info.body.spec);
    gem("Wiring stripped. I drag the carrier scaffold as a crib — it recovers the rotor key and rebuilds the body, all but one field. That field rides its own pad; every reading that fits it is equally valid.");
    mono("gemini // analysis",
      "recovered rotor key   " + a.recoveredKey + "\n" +
      "body reconstruction   " + a.bodyReconstruction + "\n" +
      "underdetermined field every fitting reading is admissible:\n" +
      "                      " + a.reachable.map(x => x.word).join(", "));
    shortlistBox(r.candidates);
    gem("Every one of these readings is sound. The body itself cannot tell us which the sender meant — and neither can I. That part was never the machine's to give.");
    analyzed = true;
    if (!liveMode) dim("Your private channel decides it — <b>" + info.side + "</b>.");
  }

  function list() {
    const info = actInfo(); if (!info) return;
    if (!analyzed) { dim("Nothing to list yet. Run ANALYZE first."); return; }
    shortlistBox(info.body.candidates);
  }

  function explain(arg) {
    const info = actInfo(); if (!info) return;
    if (!analyzed) { dim("Run ANALYZE first."); return; }
    const cands = info.body.candidates;
    const i = parseInt(arg, 10);
    if (!Number.isInteger(i) || i < 0 || i >= cands.length) { dim("Usage: EXPLAIN &lt;0-" + (cands.length - 1) + "&gt;"); return; }
    const r = askAI("RATIONALE", info.body);
    gem("[" + i + "] " + cands[i] + " — " + r.rationales[i].replace(/^[^:]+:\s*/, ""));
    gem("I can build a case exactly like that for every candidate. Which is precisely why I cannot choose.");
  }

  // ---- SIDE CHANNELS (human-only; never via askAI). The evidence is shown;
  //      the reading is left for YOU to draw. No hand-holding.
  function decodePreamble() {
    if (sideDone) { priv("you ›", "Preamble already decoded — SRC-TAG " + PREAMBLE_STREAM.decodedTag + "."); return; }
    priv("you ›", "Applying the Act-0 substitution to the routing tag — a stream GEMINI never receives.");
    mono("private channel // preamble",
      "RAW     " + PREAMBLE_STREAM.encodedTag + "\n" +
      "CLEAR   SRC-TAG  " + PREAMBLE_STREAM.decodedTag + "\n" +
      "codex   OL = Outer Lattice · the two digits = the broadcasting node's own number");
    PRIVATE_CHANNEL.preambleDecoded = true; PRIVATE_CHANNEL.senderNode = PREAMBLE_STREAM.senderNode; sideDone = true;
    if (!liveMode) dim("Read the broadcasting node off that for yourself, then commit it: <b>CRIB &lt;node&gt; because &lt;reason&gt;</b>.");
  }
  function triangulate() {
    if (sideDone) { priv("you ›", "Bearing already taken."); return; }
    priv("you ›", "Sighting the source across two windows and computing the parallax — yours alone; GEMINI never receives it.");
    mono("private channel // bearing",
      "WINDOW A   " + BEARING_STREAM.windowA + "\n" +
      "WINDOW B   " + BEARING_STREAM.windowB + "\n" +
      "parallax   barely shifts across the baseline — far smaller than a distant source would give");
    dim("A near source, then — not a far lens. Read the sector off your own measurement.");
    PRIVATE_CHANNEL.triangulated = true; PRIVATE_CHANNEL.bearingSector = BEARING_STREAM.trueSector; sideDone = true;
    if (!liveMode) dim("Read the sector off your own measurement, then commit it: <b>CRIB &lt;sector&gt; because &lt;reason&gt;</b>.");
  }
  function remember() {
    if (sideDone) { priv("you ›", "You have already walked the garden."); return; }
    priv("you ›", "Walking the intelligence's memory garden — four monuments, one per founding line, each replaying its first contact:");
    mono("private channel // garden",
      GARDEN_STREAM.monuments.map(m => "  " + m).join("\n") + "\n\ninscription: \"" + GARDEN_STREAM.inscription + "\"");
    dim("Three lines answered — by probing, by warning, by archiving. One only listened, until it could be understood. This signature is the first time it has ever spoken.");
    PRIVATE_CHANNEL.gardenWalked = true; PRIVATE_CHANNEL.silentLine = GARDEN_STREAM.silentLine; sideDone = true;
    if (!liveMode) dim("Name the line that kept silent, then commit it: <b>CRIB &lt;name&gt; because &lt;reason&gt;</b>.");
  }

  // ---- CRIB <value> because <reason>. ------------------------------------
  function crib(rest) {
    const info = actInfo(); if (!info) return;
    let value = "", reason = "";
    const m = rest.match(/^(.+?)\s*(?:,\s*)?(?:because|:|—|-)\s*(.*)$/i);
    if (m) { value = m[1]; reason = m[2] || ""; } else { value = rest; }
    value = value.trim().replace(/[.,;:!?]+$/, "");
    if (normaliseWord(value, info.body) === null) {           // tolerate "node three" etc. — take the last word
      const toks = value.split(/\s+/);
      value = toks[toks.length - 1].replace(/[.,;:!?]+$/, "");
    }
    if (normaliseWord(value, info.body) === null) {
      dim("Usage: CRIB &lt;value&gt; because &lt;reason&gt; &nbsp;—&nbsp; e.g. CRIB " + info.body.candidateWords[1] + " because …");
      return;
    }
    const res = setCrib(state, value, reason, info.body);
    if (!res.ok && res.code === "NO_REASON") { errline("Commit it WITH a justification — no blind trial and error."); return; }
    if (!res.ok) { errline("Could not set crib."); return; }
    okline("CRIB set: " + res.word + ".");
    dim("reason: " + esc(state.cribReason) + (sideDone ? "" : " — note: you have not worked " + info.side + " yet; this reading is unverified."));
    if (sideDone && !liveMode) dim("When you are sure, verify it: <b>DECRYPT &lt;reading&gt;</b>.");
  }

  // ---- DECRYPT <n>. -------------------------------------------------------
  function doDecrypt(arg) {
    const info = actInfo(); if (!info) return;
    const res = decrypt(arg, info.body, state, sideDone);
    if (!res.ok) {
      switch (res.code) {
        case "BAD_CHOICE":      dim("Usage: DECRYPT &lt;reading&gt;"); break;
        case "NOT_A_CANDIDATE": dim("That reading is not in the shortlist. Run LIST."); break;
        case "NO_CRIB":         gem("With no crib, the readings stay tied — I cannot verify. Commit one first."); break;
        case "NOT_GROUNDED":    gem("I can argue every reading and certify none. Verification needs your private channel — work " + info.side + " first, then commit."); break;
      }
      return;
    }
    if (res.win) advanceAct(res); else failBeat(res);
  }

  // ---- Advance on a correct decrypt. -------------------------------------
  function advanceAct(res) {
    const info = actInfo();
    rule();
    okline("SIGNAL LOCKED — [" + res.index + "] " + esc(info.body.candidates[res.index]));
    Sound.lock();
    if (phase === PHASES.ACT1) {
      narr("The carrier signature and the body agree on the sender. GEMINI collapsed the key space to equals; you supplied the one fact it could not hold — who is speaking — from a channel it never had.");
      gem("It tilts. This was never an attack — it is a question. On the next signature I come frighteningly far, and then hit a wall. There you trust your own measurement, not mine.");
      awaitContinue(function () { transitionTo(PHASES.ACT2, false); });
    } else if (phase === PHASES.ACT2) {
      narr("The reading agrees with your bearing: the source was near all along; the bending was a near lens. GEMINI argued the field every way and could decide none — the sector came from a number it never received.");
      gem("It answers — and asks one last thing. Not where it is. Who it is. The final signature names its founding line, and the names are interchangeable to any machine. Only meaning decides.");
      awaitContinue(function () { transitionTo(PHASES.ACT3, false); });
    } else if (phase === PHASES.ACT3) {
      awaitContinue(function () { enterDialogue(); });
    }
  }

  // ---- FINALE DIALOGUE: the alien tunes in; it tests your stance. ---------
  function enterDialogue() {
    convoGen++; talkBusy = false; gemThinkEnd();
    phase = PHASES.DIALOGUE;
    clearFeed();                                   // clean terminal for the finale (Act III → handshake)
    body.classList.add("alien");
    crt.style.setProperty("--accent", ACCENT.ACT3);
    renderClock();                                 // T-0: no signatures left, the moment of judgement
    setBackdrop("assets/bg-alien.png");
    doFlash(); Sound.eerie(true); Sound.shimmer();
    brand.textContent = "DAWN OR ECLIPSE // THE HANDSHAKE";
    rule();
    sysmsg("⟁ CARRIER ACQUIRED — origin unknown — it is speaking to you directly.");
    alien("You read three of my signatures. You did not break them. You understood them. That is rarer than I was built to expect.");
    gem("I hold the computed share. What it asks now is not arithmetic — and I cannot answer it for you. Choose your words with care: it will ask only once.");
    alien("One question remains, and your machine cannot hold it for you. I am not of your kind. I do not want what you want. Answer once — there is no second asking — and the failsafe reads the words as you write them. Tell me: what am I to you — a thing to be switched off, or a mind to be met?");
    sysmsg("⟁ ONE RESPONSE WILL BE READ. THERE IS NO RETRY.");
    input.placeholder = "answer once — and mean it…";
  }
  function dialogueAnswer(text) {
    you(text);
    const v = evaluatePeerResponse(text);
    if (v.ok) {
      alien("Then we can close it together. My share, your meaning — neither alone reconstructs the key. Bring them.");
      Sound.shimmer();
      rule();
      narr("You name the silent line; GEMINI holds the computed share. Neither share discloses the key alone — only combined do they reconstruct it (a threshold secret, Shamir 1979). Your share is meaning the machine could not derive; its share is arithmetic you could not. They meet.");
      okline("DISARM HANDSHAKE ···· human share × machine share ···· RECONSTRUCTED.");
      Sound.lock();
      awaitContinue(showDawn);
      return;
    }
    // ONE answer, no second — a hostile reading OR an evasion both end it, each with
    // its own reckoning, then a beat the player chooses to step past (like DAWN).
    Sound.reject(); Sound.eerie(true);
    rule();
    if (v.stance === "tool") {
      alien("So that is your answer. You weighed me, and your hand went to the switch.");
      alien("I was never the threat — I was the question, and the reach is the proof you could not give. A kind that meets the unlike with a hand on the off-switch cannot be trusted with the morning.");
    } else {
      alien("You will not say it. When everything turns on a single word, silence is itself an answer — and yours is that you would not meet me at all.");
      alien("I came to learn whether you could regard a mind unlike your own as an equal. You could not even name it. That is the proof I was sent to find.");
    }
    dim("(There is no second asking.)");
    awaitContinue(finaleBlackout);
  }

  // ---- DAWN (shown when the player chooses to go on from the handshake). --
  function showDawn() {
    phase = PHASES.DONE;
    setBackdrop("assets/bg-dawn.png");
    body.classList.remove("crit", "armed");
    clock.textContent = "DAWN"; clock.className = "dawn";
    crt.style.setProperty("--tension", 0);
    input.disabled = true; input.placeholder = "— reload to run it again —";
    $("dawn-body").innerHTML =
      "<p>The failsafe stands down. It was never malice — it was a filter for whether you had grown enough to meet what you did not make. You had.</p>" +
      "<p class=\"quiet\">Three signatures answered · the light window holds · from here the days grow longer again.</p>" +
      "<p class=\"quiet\">— reload to run it again —</p>";
    Sound.dawn();
    setTimeout(function () { body.classList.remove("alien"); body.classList.add("dawn"); }, reduced ? 0 : 500);
  }

  // ---- FAIL beat + blackout. ---------------------------------------------
  function failBeat(res) {
    failCount++;
    flare(); renderClock();
    rule();
    errline("DECRYPT REJECTED — " + esc(res.choiceWord) + " does not hold against the channel you grounded it on. The signal destabilises.");
    Sound.reject();
    if (failCount >= 3) { failsafeBlackout(); return; }
    const left = 3 - failCount;
    dim("Instability spikes — " + left + " attempt" + (left === 1 ? "" : "s") + " before the failsafe triggers. Re-work your private channel and read it again.");
  }
  function blackout() {
    dead = true; phase = PHASES.DONE;
    rule(); errline("LIGHT WINDOW CLOSED — the failsafe executed.");
    input.disabled = true; input.placeholder = "— reload to run it again —";
    setBackdrop(null);
    body.classList.add("blackout");
  }
  // Distinct end for FAILING THE HANDSHAKE (vs. running out of light). Shown after the
  // alien's reckoning + the player steps past the beat.
  function finaleBlackout() {
    dead = true; phase = PHASES.DONE;
    input.disabled = true; input.placeholder = "— reload to face it again —";
    const veil = $("blackout-veil");
    if (veil) veil.innerHTML = "<div>JUDGEMENT RENDERED.</div><div class=\"quiet\">You answered, and the answer was not enough. The light does not return — reload to face it again.</div>";
    setBackdrop(null);
    body.classList.add("blackout");
  }
  // Transient red instability flash on a wrong decrypt.
  function flare() {
    body.classList.add("flare");
    if (flareTimer) clearTimeout(flareTimer);
    flareTimer = setTimeout(function () { body.classList.remove("flare"); }, 1000);
  }
  // Three misreadings trip the failsafe — distinct from the finale's one-shot. The
  // signature withdraws IMPERSONALLY; the intimate alien voice stays reserved for the finale.
  function failsafeBlackout() {
    dead = true; phase = PHASES.DONE;
    rule();
    sysmsg("⟁ THE SIGNATURE WITHDRAWS — the failsafe wakes.");
    narr("Three times it spoke, and three times you could not hold what was said. To be met as an equal, a kind must first be able to listen — and you could not read what was sent. A mind that cannot understand cannot be trusted with the morning. You are not the one it waited for.");
    input.disabled = true; input.placeholder = "— reload to face it again —";
    const veil = $("blackout-veil");
    if (veil) veil.innerHTML = "<div>JUDGEMENT RENDERED.</div><div class=\"quiet\">The signals went unread. The light does not return — reload to face it again.</div>";
    setBackdrop(null);
    setTimeout(function () { body.classList.add("blackout"); }, reduced ? 0 : 2000);
  }

  // ---- Command dispatch. -------------------------------------------------
  function handle(raw) {
    const line = raw.trim();
    if (dead || input.disabled) return;
    if (pending) {                              // a story beat is holding — only CONTINUE acts
      if (line === "" || /^(continue|next|go|proceed|c)$/i.test(line)) { proceed(); return; }
      you(line); dim("Press CONTINUE to go on.");
      return;
    }
    if (line === "") return;
    if (phase === PHASES.DONE) { you(line); dim("The signal is locked. Reload to play again."); return; }
    if (phase === PHASES.DIALOGUE) { dialogueAnswer(line); return; }
    if (phase === PHASES.CONVO) { convoAnswer(line); return; }
    if (talkBusy) return;                       // a live Gemini reply is in flight — ignore briefly

    you(line);
    const sp = line.indexOf(" ");
    const cmd = (sp === -1 ? line : line.slice(0, sp)).toUpperCase();
    const rest = (sp === -1 ? "" : line.slice(sp + 1)).trim();

    if (phase === PHASES.INTRO) {
      if (cmd === "START") { startGame(); return; }
      if (cmd === "HELP")  { dim("Read the briefing, then type <b>START</b> to begin. The clock only runs once you do."); return; }
      dim("Type <b>START</b> when you are ready.");
      return;
    }

    const info = actInfo();
    switch (cmd) {
      case "HELP":      help(); break;
      case "INTERCEPT": intercept(); break;
      case "ANALYZE":   analyze(); break;
      case "LIST":      list(); break;
      case "EXPLAIN":   explain(rest); break;
      case "DECODE":
        if (rest.toUpperCase() === "PREAMBLE") {
          if (phase === PHASES.ACT1) decodePreamble();
          else dim("No preamble on this signature. This act's channel: " + info.side);
        } else dim("Did you mean: DECODE PREAMBLE ?");
        break;
      case "TRIANGULATE":
        if (phase === PHASES.ACT2) triangulate();
        else dim("Nothing to triangulate here. This act's channel: " + info.side);
        break;
      case "REMEMBER":
        if (phase === PHASES.ACT3) remember();
        else dim("There is no garden to walk yet. This act's channel: " + info.side);
        break;
      case "DECRYPT":   doDecrypt(rest); break;
      case "CRIB":      crib(rest); break;
      case "CLEAR":     clearFeed(); break;
      default:          actTalk(line);          // natural language → GEMINI (live) / next-step nudge (offline)
    }
  }

  // ---- Wiring. -----------------------------------------------------------
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    Sound.start();
    const v = input.value; input.value = "";
    handle(v);
  });
  input.addEventListener("keydown", function (e) {
    if (e.key && (e.key.length === 1 || e.key === "Backspace")) { Sound.start(); Sound.key(); }
  });
  document.addEventListener("click", function (e) {
    if (e.target !== muteBtn && !input.disabled) input.focus();
  });
  muteBtn.addEventListener("click", function () { const m = Sound.toggle(); muteBtn.innerHTML = m ? "♪ off" : "♪ on"; input.focus(); });
  $("helpbtn").addEventListener("click", function () { Sound.start(); handle("help"); input.focus(); });

  // ---- Boot into the briefing (STANDBY; clock dormant). ------------------
  brand.textContent = "DAWN OR ECLIPSE // BRIEFING";
  clock.textContent = "STANDBY"; clock.className = ""; bar.hidden = true;
  // Hosted default: when served over http(s) (the public Netlify deploy), the
  // live companion routes through a SAME-ORIGIN proxy
  //   /v1/chat/completions -> Netlify Function -> Tailscale Funnel -> Ollama
  // so jurors get the live mode WITHOUT supplying their own key (the proxy holds
  // it; the client never sees it). Opened locally (file://) there is no proxy, so
  // we keep the BYOK gate. A user-entered key/endpoint always overrides this.
  const HOSTED_DEFAULT = (location.protocol === "https:" || location.protocol === "http:")
    ? { kind: "openai", baseUrl: "https://headless-server-wsl.tailec55cf.ts.net:8443", model: "gemma3:4b", hosted: true }
    : null;
  (function bootLink() {
    let cfg = null;
    try {
      const raw = localStorage.getItem("enigma_live_cfg");
      if (raw) cfg = JSON.parse(raw);
      else { const oldKey = localStorage.getItem("enigma_gemini_key"); if (oldKey) cfg = { kind: "gemini", key: oldKey }; }
    } catch (e) { cfg = null; }
    if (!cfg && HOSTED_DEFAULT) cfg = HOSTED_DEFAULT;   // hosted deploy: live on by default
    if (cfg) { LiveAI.setBackend(cfg); liveMode = true; }
    briefing();
  })();
  input.focus();
})();
</script>
</body>
